  {
    "type": "case",
    "id": 1,
    "title": "RHD with IE, Stroke, HF",
    "vignette": "A 26F from rural village presents with high-grade fever, progressive SOB, right-sided weakness 2d. Murmur since childhood, never evaluated. 3wks low-grade fever treated with OTC antibiotics. Exam: febrile 39.1 C, tachycardic 110, tachypneic 28, BP 110/70. Mild pallor, splinter hemorrhages, Osler's nodes. Irregularly irregular pulse + grade 4/6 holosystolic murmur at apex radiating to axilla. Right-sided weakness MRC 3/5. Hb 9.2, WBC 14.5K, Plt 220K. ECG: AF with RVR. CXR: cardiomegaly + bilateral pulmonary venous congestion. CT head not available immediately.",
    "questions": [
      {"id":81,"stem":"Most likely diagnosis?","opts":["A. Infective endocarditis with systemic embolization","B. Rheumatic fever with carditis only","C. Atrial myxoma with constitutional symptoms","D. SLE with Libman-Sacks"],"correct":"A","expl":"Fever + murmur + emboli (stroke, splinter hemorrhages, Osler nodes) = Modified Duke criteria for IE in setting of pre-existing RHD (2 major + minor).","ref":"Harrison's Ch. 173 + Mudit Khanna IE","topic":"Cardiology"},
      {"id":82,"stem":"Most appropriate blood culture collection?","opts":["A. 3 sets from separate venipuncture sites","B. 1 set drawn automatically from indwelling","C. 2 sets drawn after starting antibiotics","D. 4 sets at 24-hour intervals"],"correct":"A","expl":"At least 3 sets blood cultures from separate venipuncture sites before antibiotics; timing less critical in subacute but ALL before antibiotics.","ref":"Harrison's Ch. 173","topic":"Cardiology"},
      {"id":83,"stem":"What does right-sided weakness most likely represent?","opts":["A. Left MCA embolus","B. Right cerebral hemorrhage","C. Left ACA ischemia","D. Right brainstem lacunar infarct"],"correct":"A","expl":"Embolus from left-sided (mitral valve) vegetation going to left MCA territory leading to right hemiparesis; embolization common in IE esp. Staph + MV.","ref":"Harrison's Ch. 173 + Mudit Khanna IE Complications stroke","topic":"Cardiology"},
      {"id":84,"stem":"Most appropriate immediate management?","opts":["A. Blood cultures + empirical IV ceftriaxone + gentamicin","B. IV heparin infusion immediately for stroke prevention","C. Oral amoxicillin and outpatient follow-up in 48h","D. Thrombolysis tPA for acute ischemic stroke"],"correct":"A","expl":"Blood cultures then start ceftriaxone+gentamicin. Heparin/thrombolysis CONTRAINDICATED in septic embolic stroke (hemorrhage risk high).","ref":"Harrison's Ch. 173 + Mudit Khanna Neurology stroke contraindications","topic":"Cardiology"},
      {"id":85,"stem":"Finding most indicative of severe MR?","opts":["A. Holosystolic murmur radiating to axilla","B. Early diastolic murmur at right sternal border","C. Pansystolic murmur at lower sternal border","D. Mid-diastolic rumble with opening snap only"],"correct":"A","expl":"Holosystolic murmur at apex radiating to axilla = MR; severity suggested by loud murmur+signs HF (pulmonary congestion CXR).","ref":"Mudit Khanna Cardiology murmurs + Harrison's Ch. 273","topic":"Cardiology"}
    ]
  },
  {
    "type": "case",
    "id": 2,
    "title": "TB + HIV",
    "vignette": "A 34M with 2mo cough productive, night sweats, weight loss. Known HIV+ on ART (zidovudine, lamivudine, nevirapine) 8mo. CD4 120 6wks ago. Adherent to ART. Exam: cachectic (BMI 16.2), febrile 38.5, breath sounds decreased upper bilateral zones. CXR: bilateral upper zone cavitary lesions. GeneXpert: MTB+. Viral load detectable. LFTs normal.",
    "questions": [
      {"id":86,"stem":"Most appropriate immediate step?","opts":["A. Start ATT with appropriate ART adjustments","B. Stop ART immediately wait for TB culture","C. Start ATT only delay ART for 3 months","D. Start ART only delay ATT for 2 months"],"correct":"A","expl":"Start ATT immediately (HRZE); rifampicin interacts with ART (esp. NNRTIs); ART continued but may need adjustment (switch NVP to efavirenz compatible rifampicin).","ref":"Harrison's Ch. 260 + WHO guidelines","topic":"Infectious Disease"},
      {"id":87,"stem":"Which ATT drug has most significant interaction with ART?","opts":["A. Rifampicin","B. Isoniazid","C. Ethambutol","D. Streptomycin"],"correct":"A","expl":"Rifampicin = potent CYP450 inducer leading to increased metabolism of ART and subtherapeutic levels; may require ART modification (efavirenz+RIF compatible; NVP levels decreased).","ref":"Harrison's Ch. 260 + WHO TB/HIV guidelines","topic":"Infectious Disease"},
      {"id":88,"stem":"Two weeks after starting ATT: fever increases, lymphadenopathy, worsening respiratory despite TB improvement. Consistent with?","opts":["A. Immune reconstitution inflammatory syndrome (IRIS)","B. TB treatment failure","C. Drug hypersensitivity reaction","D. Nosocomial pneumonia"],"correct":"A","expl":"IRIS (paradoxical): paradoxical worsening after ATT/ART as immune system recovers mounts inflammatory response to TB antigens; treat with continue ATT+symptomatic management; steroids for severe cases.","ref":"Harrison's Ch. 260 + WHO TB/IRIS guidelines 2025","topic":"Infectious Disease"},
      {"id":89,"stem":"Most important monitoring during ATT in this patient?","opts":["A. Monthly LFTs (hepatotoxicity)","B. Serial CD4 every 2wks","C. Monthly CXR","D. Serial GeneXpert weekly"],"correct":"A","expl":"ATT can cause hepatotoxicity; esp. HIV coinfected. Check LFTs monthly+clinical monitoring for jaundice, abdominal pain, nausea; stop ATT if ALT >3xULN symptomatic or >5xULN asymptomatic.","ref":"Harrison's Ch. 260 + Mudit Khanna TB monitoring","topic":"Infectious Disease"},
      {"id":90,"stem":"How long should TB treatment continue in HIV+ patient?","opts":["A. 6 months total standard regimen","B. 9-12 months recommended standard","C. 12 months minimum HIV+ patients","D. 4 months intensive phase only"],"correct":"A","expl":"Standard 6mo (2HRZE+4HR) effective for TB in HIV+ pts; extended only if: cavitary disease+positive culture at 3 months, or TB meningitis, bone/joint TB, MDR-TB.","ref":"WHO TB/HIV Co-Treatment Guidelines 2025","topic":"Infectious Disease"}
    ]
  },
  {
    "type": "case",
    "id": 3,
    "title": "Sepsis with AKI, Hyperkalemia, Dialysis",
    "vignette": "A 48M brought to ER with confusion, decreasing urine output, fever 2d. Recently treated for pneumonia with oral antibiotics + NSAIDs. Exam: febrile 38.8 C, BP 88/55, HR 130, RR 24, SpO2 92%. JVP not raised, clear lungs, no edema. Urine output less than 200mL in 8h. Labs: Na 128, K 6.8, Cl 102, HCO3 15, BUN 98, Cr 5.4, glucose 92, WBC 18.5K, Hb 11.2, plts 180K. ABG: pH 7.24, PaCO2 30, PaO2 58. ECG: tall peaked T-waves. Urine: dark brown granular casts.",
    "questions": [
      {"id":91,"stem":"Most likely cause of AKI in this patient?","opts":["A. Acute tubular necrosis (ATN)","B. Prerenal azotemia dehydration shock","C. Acute interstitial nephritis from NSAIDs","D. Postrenal ureteral obstructive stone"],"correct":"A","expl":"Sepsis (fever 38.8 C, hypotension 88/55, HR 130) + muddy brown casts + oliguria = ATN (intrinsic AKI); NSAID-cause AIN typically WBC casts, eosinophiluria; prerenal typically FeNa <1%, no casts.","ref":"Mudit Khanna Nephrology AKI differentiation table Q220-230","topic":"Nephrology"},
      {"id":92,"stem":"First intervention for hyperkalemia?","opts":["A. IV calcium gluconate","B. IV insulin+dextrose infusion","C. Oral sodium polystyrene sulfonate resin","D. Nebulized salbutamol 10mg dose"],"correct":"A","expl":"Hyperkalemia+ECG changes (peaked T-waves, widened QRS)+K+ 6.8: IV calcium gluconate FIRST to stabilize cardiac membrane; then insulin+glucose to lower K+ levels. Hemodialysis definitive for refractory cases.","ref":"Mudit Khanna Nephrology Q270 Emergency protocol + Harrison's Ch. 60","topic":"Nephrology"},
      {"id":93,"stem":"Which is indication for emergency dialysis in this patient?","opts":["A. Refractory hyperkalemia + ECG changes","B. BUN >50 mg/dL only","C. Urine output <40mL/day alone","D. Metabolic acidosis pH<7.40 mild"],"correct":"A","expl":"Emergency dialysis: AEIOU (Acidosis refractory, Electrolyte abnormalities (hyperkalemia refractory), Intoxications, fluid Overload refractory, Uremia complications). K+ 6.8+ECG: hemodialysis (if refractory).","ref":"Mudit Khanna Dialysis Indications Q265 + Harrison's Ch. 320","topic":"Nephrology"},
      {"id":94,"stem":"Most important initial hemodynamic intervention in septic shock?","opts":["A. IV crystalloid fluid resuscitation 30mL/kg","B. IV dopamine infusion only for BP support","C. Immediate broad-spectrum antibiotics alone","D. IV hydrocortisone low-dose stress dose"],"correct":"A","expl":"Septic shock: aggressive IV crystalloid (30mL/kg NS) within 1st 3h then vasopressor (NE first-line) if MAP persistently <65 despite fluids. Antibiotics within 1h but fluids start simultaneously.","ref":"SSC 2025 Guidelines + Harrison's Ch. 323","topic":"Critical Care"},
      {"id":95,"stem":"Which finding best distinguishes ATN from prerenal AKI?","opts":["A. Muddy brown granular casts urinalysis","B. FeNa <1% (indicating prerenal state)","C. Urine osmolality >500 mOsm/kg (concentrated)","D. BUN:creatinine ratio >20:1"],"correct":"A","expl":"Muddy brown granular casts = ATN; FeNa >2%, UOsm <350 differentiate ATN from prerenal (FeNa <1%, UOsm >500, BUN:Cr >20:1).","ref":"Mudit Khanna Q225 + Harrison's Ch. 312","topic":"Nephrology"}
    ]
  },
  {
    "type": "case",
    "id": 4,
    "title": "GI Bleed in Cirrhosis",
    "vignette": "A 52M with 20 yrs known cirrhosis presents with hematemesis+melen increasing abdominal distension. Exam: pale, jaundiced, encephalopathic (GCS 12). VS: BP 85/50, HR 125, SpO2 93% RA. Abdomen distended shifting dullness+, firm liver edge 2cm BCM, splenomegaly+. Spider naevi+. NG tube: 400mL frank blood. Labs: Hb 6.5, plts 85K, PT (INR 2.8), bili 4.2, alb 2.5, Cr 1.8, NH3 120.",
    "questions": [
      {"id":96,"stem":"Most likely source of bleeding?","opts":["A. Esophageal varices","B. Peptic ulcer of duodenum","C. Erosive gastritis severe","D. Mallory-Weiss tear"],"correct":"A","expl":"Cirrhosis+hematemesis+melen+portal HTN signs (splenomegaly, ascites, decreased plts) = Esophageal variceal hemorrhage most likely source; varices approximately 60% of UGIB in cirrhotic patients.","ref":"Mudit Khanna Gastro UGIB + Harrison's Ch. 333","topic":"Gastroenterology"},
      {"id":97,"stem":"Most appropriate immediate management?","opts":["A. 2 large-bore IVs, crystalloids, blood, octreotide, ceftriaxone","B. Emergency endoscopy within 30 minutes","C. Balloon tamponade as first-line therapy","D. TIPS procedure immediate first-line"],"correct":"A","expl":"Acute variceal bleed protocol: 1) Resuscitation (2LBIV, crystalloid to packed RBCs), 2) IV octreotide (50mcg bolus +400mcg/h), 3) IV ceftriaxone 1g SBP prophylaxis, 4) PPI, endoscopy within 12h for banding. Tamponade rescue therapy only; TIPS failure rescue therapy.","ref":"Harrison's Ch. 333 + Mudit Khanna Gastro UGIB variceal bleed protocol","topic":"Gastroenterology"},
      {"id":98,"stem":"After stabilization most appropriate management for hepatic encephalopathy?","opts":["A. Oral lactulose titration to effect","B. Oral neomycin antibiotic monotherapy","C. IV mannitol osmotic cerebral edema therapy","D. IV sodium phenylbutyrate infusion therapy"],"correct":"A","expl":"Hepatic encephalopathy: oral lactulose (30-60mL q1-2h until BM then 2-3 BM/d); rifaximin added if no response. IV mannitol only for cerebral edema in acute liver failure, not cirrhotic HE.","ref":"Mudit Khanna Gastro Hepatic Encephalopathy + Harrison's Ch. 339","topic":"Gastroenterology"},
      {"id":99,"stem":"Which finding in ascitic fluid suggests SBP in this patient?","opts":["A. PMN count >250/microliter","B. pH consistently >7.35","C. Glucose level >60 mg/dL","D. LDH < serum LDH level"],"correct":"A","expl":"Diagnosis SBP: ascitic PMN >250 cells/mm3, even before culture results. Cirrhotics with UGIB high risk SBP (20-30%); prophylactic abx (IV ceftriaxone 1g/d x 7d) indicated.","ref":"Mudit Khanna Gastro SBP Q230 + Harrison's Ch. 331","topic":"Gastroenterology"},
      {"id":100,"stem":"If develops worsening AKI oliguria despite fluid ascitic fluid normal US no obstruction most likely?","opts":["A. Hepatorenal syndrome (HRS) type 1","B. Acute tubular necrosis from ischemia","C. Prerenal azotemia dehydration","D. IgA nephropathy cirrhosis-associated"],"correct":"A","expl":"HRS type 1: rapidly progressive renal dysfunction (Cr >2.5 in <2wks) in cirrhotics with ascites, absence of shock, no structural renal disease; precipitated by UGIB, SBP; diagnosis of exclusion; management: vasoconstrictors+albumin.","ref":"Mudit Khanna Gastro HRS Q235 + Harrison's Ch. 331","topic":"Gastroenterology"}
    ]
  },
  {
    "type": "case",
    "id": 5,
    "title": "Hypertensive Stroke",
    "vignette": "A 50F with no medical history presents with sudden headache, vomiting, right-sided weakness, drowsiness. Exam: BP 220/130, HR 88. GCS 11. Left Babinski+, right hemiplegia. Neck stiff? no. CT head (after 2h referral delay): large left putaminal hemorrhage with intraventricular extension. ECG: LVH strain only. UA: 2+ protein.",
    "questions": [
      {"id":101,"stem":"Most likely risk factor for this stroke?","opts":["A. Chronic severe hypertension","B. Undiagnosed RHD with AF","C. Malignant primary brain tumor","D. Cerebral amyloid angiopathy"],"correct":"A","expl":"Long-standing uncontrolled HTN + putamen hemorrhage (classic location hypertensive ICH) = hypertensive hemorrhage. Basal ganglia hemorrhage 50-60% of hypertensive ICH. LVH strain, proteinureia all indicate target organ damage from chronic HTN.","ref":"Harrison's Ch. 429 + Mudit Khanna Neurology stroke ICH","topic":"Neurology"},
      {"id":102,"stem":"Most appropriate immediate intervention?","opts":["A. IV labetalol to lower BP <180/105 safely","B. Emergency surgical evacuation hematoma immediately","C. IV mannitol reduce ICP only alone first-line","D. Nimodipine prevent cerebral vasospasm only agent"],"correct":"A","expl":"ICH with BP >220/120 or potential for expansion, lowers BP to <180/105 safely (not too rapidly) using IV labetalol/nicardipine. No surgery for deep (basal ganglia) hemorrhage.","ref":"AHA/ASA ICH Guidelines 2015 + Harrison's Ch. 429 + Mudit Khanna Neurology stroke ICH","topic":"Neurology"},
      {"id":103,"stem":"Most common location hypertensive ICH?","opts":["A. Putamen (basal ganglia)","B. Cerebellar hemisphere vermis","C. Lobar cortical frontal white matter","D. Pons"],"correct":"A","expl":"Putamen (basal ganglia) most common (approximately 50%), then thalamus (15%), cerebellum (10%), pons (10%), lobar (10-20%).","ref":"Harrison's Ch. 429 Table","topic":"Neurology"},
      {"id":104,"stem":"Role of nimodipine in this patient?","opts":["A. Not indicated; for aneurysmal SAH prevention only","B. First-line BP lowering for intracranial pressure","C. Hematoma expansion reduction proven benefit","D. Prevents recurrent hemorrhagic stroke events"],"correct":"A","expl":"Nimodipine indicated for vasospasm prevention in aneurysmal SAH, NOT ICH HTN. BP lowering in ICH: labetalol, nicardipine, nitroprusside if needed.","ref":"Mudit Khanna Neurology Nimodipine indications + Harrison's Ch. 429","topic":"Neurology"},
      {"id":105,"stem":"After 48h, condition worsens GCS 8. Repeat CT shows: hematoma enlargement midline shift uncal herniation same side. Most appropriate?","opts":["A. Neurosurgical consultation for decompressive craniectomy","B. Continue IV labetalol increase fluid challenge","C. IV thrombolysis tPA to dissolve immediately","D. IV dexamethasone reduce vasogenic edema brain swelling"],"correct":"A","expl":"Worsening with significant neurological deterioration, midline shift + herniation = neurosurgical emergency; decompressive hemicraniectomy life-saving option. Corticosteroids are NOT beneficial in ICH (may worsen outcomes per STITCH trials).","ref":"Harrison's Ch. 429 + Neurosurgical Emergency Guidelines","topic":"Neurology"}
    ]
  },
  {
    "type": "case",
    "id": 6,
    "title": "Diabetic Ketoacidosis",
    "vignette": "A 20F college student brought by roommates for increasing lethargy, excessive thirst, frequent urination 3d. T1DM at age 15 on insulin but stopped 2wks ago 'afraid of needles.' Exam: confused arousable, tachypneic Kussmaul, dry mucous membranes, sunken eyes. VS: BP 95/60, HR 120, RR 28, T 37.2. Glucose: 450 mg/dL. Urinalysis: glucose 4+, ketones 3+.",
    "questions": [
      {"id":106,"stem":"Most appropriate initial diagnostic test?","opts":["A. Arterial blood gas analysis with basic electrolytes","B. CT head altered mental status evaluation","C. CT chest infectious source search","D. Lumbar puncture rule out meningitis"],"correct":"A","expl":"Suspected DKA: ABG (pH), serum electrolytes (K+, esp.), glucose, BUN, Cr, ketones, osmolality initial workup before initiating treatment.","ref":"Harrison's Ch. 401 + Mudit Khanna Endocrinology DKA protocol","topic":"Endocrinology"},
      {"id":107,"stem":"Initial ABG: pH 7.12, PaCO2 22, HCO3 8. Serum Na 142, K 4.2, Cl 105. Anion gap?","opts":["A. 29 mEq/L","B. 35 mEq/L","C. 18 mEq/L","D. 40 mEq/L"],"correct":"A","expl":"AG = Na - (Cl + HCO3) = 142 - (105 + 8) = 29 mEq/L (increased) = high AG met acidosis DKA expected.","ref":"Harrison's Acid-Base + Mudit Khanna Nephrology ABG Q240","topic":"Nephrology"},
      {"id":108,"stem":"Most important initial treatment step?","opts":["A. IV normal saline bolus 1-2 L","B. IV regular insulin bolus 10U stat","C. IV sodium bicarbonate bolus infusion therapy","D. IV potassium chloride supplementation immediately"],"correct":"A","expl":"DKA management: ALWAYS start with fluid resuscitation (1-2 L NS 1st h). Fluids significantly lower glucose. Insulin started AFTER initial fluid resuscitation. Bicarbonate NOT indicated (no proven benefit may harm). K+ replacement depends level.","ref":"Harrison's Ch. 401 + Mudit Khanna Endocrinology DKA","topic":"Endocrinology"},
      {"id":109,"stem":"After 2h: glucose 280, K+ 3.2. Next step?","opts":["A. Add dextrose + K+ to IV fluids continue insulin","B. Discontinue insulin start sliding scale subQ injections","C. Add bicarbonate IV fluids continue insulin unchanged","D. Increase insulin infusion rate maximum to lower rapid glucose"],"correct":"A","expl":"Glucose approaches 250 switch fluids D5-0.45% NS prevent overcorrection hypoglycemia; add K+ fluids (3.2 requires replenishment per DKA protocol). Insulin infusion continues until AG closes. Maintain K+ 4-5 mEq/L.","ref":"Harrison's Ch. 401 + Mudit Khanna Endocrinology DKA","topic":"Endocrinology"},
      {"id":110,"stem":"Best monitoring parameter indicates resolution of DKA?","opts":["A. Closure of anion gap completely","B. Blood glucose <200 mg/dL","C. Serum glucose <200 alone only indicator","D. Blood pH normalizes single marker"],"correct":"A","expl":"Resolution defined closure of anion gap (less than or equal to 12 mEq/L) reflecting resolution ketoacidosis. While glucose may normalize early, gap may persist indicating continued acidosis present ongoing ketolysis. pH + bicarb normalize more slowly.","ref":"Harrison's Ch. 401 + Mudit Khanna DKA resolution","topic":"Endocrinology"}
    ]
  },
  {
    "type": "case",
    "id": 7,
    "title": "Interstitial Lung Disease / IPF",
    "vignette": "A 50F never-smoker teacher, progressive dyspnea 8mo, dry persistent cough. Exam: fine bilateral inspiratory crackles to mid-zones+no wheezing. Clubbing+. SpO2 90% RA to 94% on 2L/min. CXR: bilateral reticulonodular opacities lower zones predominantly. HRCT: bilateral reticular changes subpleural honeycombing+traction bronchiectasis. PFTs: FEV1 55%, FVC 50%, FEV1/FVC 0.82, DLCO 40%. Echo estimated PASP 45 mmHg.",
    "questions": [
      {"id":111,"stem":"Most likely diagnosis?","opts":["A. Idiopathic pulmonary fibrosis (UIP pattern)","B. Sarcoidosis with pulmonary involvement","C. Hypersensitivity pneumonitis chronic","D. Bronchiectasis diffuse"],"correct":"A","expl":"Restrictive PFTs (decreased FVC, decreased FEV1, ratio preserved/increased)+decreased DLCO+subpleural honeycombing on HRCT = UIP pattern most likely IPF. Age>60, no smoking, subpleural=consistent UIP. Sarcoid typically upper lobe perihilar. HP: exposure history needed.","ref":"Harrison's Ch. 325 + Mudit Khanna ILD","topic":"Pulmonology"},
      {"id":112,"stem":"Most appropriate pharmacologic treatment option?","opts":["A. Pirfenidone slow disease progression","B. High-dose oral corticosteroids indefinitely","C. Acetylcysteine monotherapy+steroids combination","D. Azathioprine with prednisone combination therapy"],"correct":"A","expl":"Pirfenidone or nintedanib slow decline FVC IPF; triple therapy (pred+AZA+NAC) associated with increased mortality (PANTHER-IPF trial) showed harm; not recommended. Immunosuppression is contraindicated in IPF.","ref":"Harrison's Ch. 325 (PANTHER-IPF) + ATS/ERS IPF 2025","topic":"Pulmonology"},
      {"id":113,"stem":"What does FEV1/FVC ratio 0.82 indicate?","opts":["A. Restrictive pattern (ratio preserved)","B. Obstructive pattern (ratio decreased)","C. Mixed pattern (ratio partially abnormal)","D. Normal pattern (no obstruction)"],"correct":"A","expl":"FEV1/FVC >0.80 + reduced FVC = restrictive pattern; both FEV1+FVC reduced FVC more affected; preserved FEV1/FVC ratio normal/high DLCO reduction confirms disease pattern parenchymal vs airway.","ref":"Harrison's PFT interpretation + Mudit Khanna Pulmonology PFT patterns","topic":"Pulmonology"},
      {"id":114,"stem":"Complication suggested PASP 45 mmHg?","opts":["A. Secondary pulmonary arterial hypertension ILD","B. Primary PAH idiopathic","C. Left heart failure secondary","D. Chronic thromboembolic pulmonary HTN"],"correct":"A","expl":"Estimated PASP 45 moderate PH secondary to diffuse lung disease Group 3 WHO classification. Common complication advanced ILD/IPF and carries poor prognosis.","ref":"Harrison's Ch. 325 (PH in ILD) + WHO PH 2025","topic":"Pulmonology"},
      {"id":115,"stem":"Poor prognostic indicator?","opts":["A. Honeycombing HRCT reticular changes","B. FEV1 <60% predicted","C. O2 sat >90% indicates no hypoxemia","D. Dry cough predominant symptom only"],"correct":"A","expl":"Honeycombing HRCT (definite UIP)=single most important adverse radiologic predictor survival IPF. Other poor prognosis: male, older age, decreased DLCO baseline, increased O2 requirements progressive decline FVC.","ref":"Mudit Khanna ILD Prognosis;ATS/ERS IPF Guidelines 2025","topic":"Pulmonology"}
    ]
  },
  {
    "type": "case",
    "id": 8,
    "title": "Sepsis / MODS",
    "vignette": "55M known diabetic presents 3d fever+chills. Found non-healing ulcer left foot. On arrival: T 39.5 C, HR 130, BP 85/45 after 1 L NS. RR 28, SpO2 90% RA. Exam: ulcer with necrotic base surrounding erythema plantar aspect L1MT. Labs: WBC 24K (90% neutrophils), plts 80K, INR 1.8, Cr 2.9 (baseline 0.9), bili 2.8, lactate 6.8, glucose 320. ABG: pH 7.22, PaCO2 35, HCO3 14. UOP 15mL/h.",
    "questions": [
      {"id":116,"stem":"Most likely source sepsis?","opts":["A. Infected diabetic foot ulcer","B. SBP in undiagnosed ascites","C. Nosocomial ventilator pneumonia","D. Central venous catheter bloodstream"],"correct":"A","expl":"Necrotic diabetic foot ulcer+surrounding cellulitis+profound shock = diabetic foot sepsis. Diabetics poor glycemic control+foot care susceptible limb-threatening infections.","ref":"Harrison's Ch. 323 (sepsis) + Mudit Khanna foot DFI","topic":"Infectious Disease"},
      {"id":117,"stem":"Most appropriate immediate BP support?","opts":["A. IV norepinephrine infusion shock","B. IV dobutamine infusion only","C. IV dopamine infusion first-line shock","D. IV hydrocortisone stress dose shock therapy"],"correct":"A","expl":"NE = first-line vasopressor septic shock; start if MAP persistently <65 despite adequate fluid resuscitation 30 mL/kg NS. Target MAP >=65. Dopamine not preferred (arrhythmias NE).","ref":"SSC 2025 + Harrison's Ch. 323 + ICU vasopressor guidelines","topic":"Critical Care"},
      {"id":118,"stem":"This patient's presentation consistent with?","opts":["A. Septic shock+MODS present","B. Sepsis without organ dysfunction only","C. Severe sepsis without shock present","D. Septic shock isolated organ dysfunction"],"correct":"A","expl":"Septic shock: hypotension requires vasopressor (MAP>=65) despite fluids+lactate >2 despite fluids. This patient: hypotension (85/45), lactate 6.8, AKI (Cr 2.9 from 0.9), plts 80K, bili 2.8: MODS. qSOFA: altered MS, RR>=22, SBP<=100. SOFA >=2+. This patient septic shock with MODS.","ref":"SSC 2025 Guidelines + Harrison's Ch. 323","topic":"Critical Care"},
      {"id":119,"stem":"Most appropriate initial antibiotic strategy?","opts":["A. Piperacillin-tazobactam+vancomycin+clindamycin","B. Ceftriaxone monotherapy only","C. Oral linzolid+metronidazole oral","D. Ciprofloxacin monotherapy fluoroquinolone"],"correct":"A","expl":"Septic shock from DFI source: broad-spectrum coverage pip-tazo (G-neg incl Pseudomonas)+vanco (MRSA)+clinda (anaerobes). Broadest empirical+local antibiogram de-escalation when cx results available. Oral antibiotics not for septic shock.","ref":"SSC 2025+IDSA DFI 2025 guidelines","topic":"Infectious Disease"},
      {"id":120,"stem":"Most important diagnostic workup?","opts":["A. Blood wound cultures before antibiotics","B. CTA foot vessels immediately first-line","C. MRI foot before any intervention start","D. Plain X-ray foot only imaging study"],"correct":"A","expl":"Always cultures (at least 2 blood, wound deep tissue samples) BEFORE antibiotics. Imaging (X-ray exclude bone, CT/MRI extent) important but cultures first before antibiotics. Source control (debridement/amputation) equally important.","ref":"Harrison's Ch. 323 (source in sepsis)+IDSA DFI 2025","topic":"Infectious Disease"}
    ]
  }
]
</script>

<script>
const topicColors = {
  'Cardiology': '#14b8a6',
  'Pulmonology': '#06b6d4',
  'Neurology': '#a78bfa',
  'Nephrology': '#f97316',
  'Gastroenterology': '#eab308',
  'Hematology': '#ec4899',
  'Endocrinology': '#22d3ee',
  'Infectious Disease': '#34d399',
  'Critical Care': '#f43f5e'
};

const topicEmojis = {
  'Cardiology': '\uD83E\uDEC0',
  'Pulmonology': '\uD83E\uDEC1',
  'Neurology': '\uD83E\uDDE0',
  'Nephrology': '\uD83E\uDDD1',
  'Gastroenterology': '\uD83E\uDDA0',
  'Hematology': '\uD83E\uDE78',
  'Endocrinology': '\u2696\uFE0F',
  'Infectious Disease': '\uD83E\uDDA0',
  'Critical Care': '\uD83D\uDE91'
};

let currentMode = 'start';

let examState = {
  currentTab: 'standalone',
  currentIndex: 0,
  answers: {},
  submitted: {},
  timeLeft: 7200,
  timerRunning: false,
  finished: false,
  reviewMode: false
};

function loadState() {
  try {
    const saved = localStorage.getItem('md-exam-state');
    if (saved) {
      const parsed = JSON.parse(saved);
      examState = { ...examState, ...parsed };
    }
  } catch (e) {}
}

function saveState() {
  try {
    localStorage.setItem('md-exam-state', JSON.stringify(examState));
  } catch (e) {}
}

function getAllQuestions() {
  const data = JSON.parse(document.getElementById('questions-data').textContent);
  const all = [];
  data.forEach(section => {
    if (section.type === 'standalone') {
      section.questions.forEach(q => all.push({ ...q, caseId: null }));
    } else {
      section.questions.forEach(q => all.push({ ...q, caseId: section.id, caseTitle: section.title, vignette: section.vignette }));
    }
  });
  return all;
}

function getStandaloneQuestions() {
  const data = JSON.parse(document.getElementById('questions-data').textContent);
  return data[0].questions;
}

function getCases() {
  const data = JSON.parse(document.getElementById('questions-data').textContent);
  return data.filter(s => s.type === 'case');
}

function formatTime(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

function render() {
  const app = document.getElementById('app');
  if (currentMode === 'start') {
    app.innerHTML = renderStartScreen();
  } else if (currentMode === 'exam') {
    app.innerHTML = renderExamScreen();
    if (examState.timerRunning && !examState.finished) {
      startTimer();
    }
  } else if (currentMode === 'results') {
    app.innerHTML = renderResultsScreen();
  }
}

function renderStartScreen() {
  return `
<div class="min-h-screen flex flex-col items-center justify-center p-6">
  <div class="text-center max-w-2xl mx-auto">
    <div class="text-6xl mb-6">\uD83E\uDE7A</div>
    <h1 class="text-4xl md:text-5xl font-bold text-white mb-3 tracking-tight">MD INTERNAL MEDICINE</h1>
    <h2 class="text-2xl md:text-3xl font-semibold text-teal-400 mb-4">EXIT EXAM</h2>
    <div class="bg-slate-800/60 rounded-xl p-4 mb-6 inline-block">
      <p class="text-sm text-teal-300 font-semibold">120 High-Yield Questions &bull; 120 Minutes &bull; Tertiary Care Level</p>
    </div>
    <div class="bg-emerald-900/30 border border-emerald-700/50 rounded-lg px-4 py-2 inline-block mb-6">
      <span class="text-emerald-400 text-sm font-medium">Grounded in Mudit Khanna (Core) + Harrison's 21e</span>
    </div>
    <div class="text-left bg-slate-800/40 rounded-xl p-6 mb-8 space-y-2 text-slate-300">
      <ul class="list-none space-y-2">
        <li class="flex items-center gap-2"><span class="text-teal-400">\u2022</span> Simulated real exit exam conditions</li>
        <li class="flex items-center gap-2"><span class="text-teal-400">\u2022</span> 80 standalone MCQs + 8 clinical cases (40questions)</li>
        <li class="flex items-center gap-2"><span class="text-teal-400">\u2022</span> Immediate feedback with Harrison's/Khanna-based explanations</li>
        <li class="flex items-center gap-2"><span class="text-teal-400">\u2022</span> Reference citations for every answer</li>
        <li class="flex items-center gap-2"><span class="text-teal-400">\u2022</span> Auto-saves progress in browser storage</li>
        <li class="flex items-center gap-2"><span class="text-teal-400">\u2022</span> Results breakdown by topic with study plan</li>
      </ul>
    </div>
    <div class="flex flex-col md:flex-row gap-4 justify-center">
      <button onclick="startExam(false)" class="bg-teal-600 hover:bg-teal-500 text-white px-8 py-3 rounded-lg font-semibold transition-colors">Start Fresh Exam</button>
      <button onclick="startExam(true)" class="bg-slate-700 hover:bg-slate-600 text-teal-400 px-8 py-3 rounded-lg font-semibold transition-colors">Resume Saved Session</button>
    </div>
  </div>
</div>`;
}

function startExam(restore) {
  if (restore) {
    loadState();
    currentMode = 'exam';
    examState.finished = false;
  } else {
    examState = {
      currentTab: 'standalone',
      currentIndex: 0,
      answers: {},
      submitted: {},
      timeLeft: 7200,
      timerRunning: true,
      finished: false,
      reviewMode: false
    };
    localStorage.removeItem('md-exam-state');
    currentMode = 'exam';
  }
  render();
}

let timerInterval = null;

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    examState.timeLeft--;
    if (examState.timeLeft <= 0) {
      examState.timeLeft = 0;
      examState.timerRunning = false;
      clearInterval(timerInterval);
      finishExam();
      return;
    }
    const el = document.getElementById('timer-display');
    if (el) {
      el.textContent = formatTime(examState.timeLeft);
      if (examState.timeLeft < 300) {
        el.classList.add('text-red-400');
        el.classList.remove('text-white');
      } else if (examState.timeLeft < 600) {
        el.classList.add('text-yellow-400');
        el.classList.remove('text-white');
      }
    }
    if (examState.timeLeft % 30 === 0) saveState();
  }, 1000);
}

function renderExamScreen() {
  const allQuestions = getAllQuestions();
  const answered = Object.keys(examState.answers).length;
  const progressPct = Math.round((answered / allQuestions.length) * 100);

  return `
<div class="min-h-screen pb-8">
  <!-- Sticky Header -->
  <div class="sticky top-0 z-50 bg-slate-950/95 backdrop-blur-sm border-b border-slate-800">
    <div class="max-w-6xl mx-auto px-4 py-2 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <span class="text-lg font-bold text-white">MD Exit Exam</span>
        <span class="text-sm text-slate-400 hidden sm:inline">${answered}/120 answered</span>
      </div>
      <div id="timer-display" class="text-xl font-mono font-semibold text-white">${formatTime(examState.timeLeft)}</div>
      <div class="flex items-center gap-2">
        <span class="text-sm text-slate-400 hidden sm:inline">${progressPct}%</span>
        <button onclick="finishExam()" class="bg-red-600/80 hover:bg-red-500 text-white px-4 py-1.5 rounded text-sm font-medium transition-colors">Finish Exam</button>
      </div>
    </div>
    <!-- Progress bar -->
    <div class="h-1 bg-slate-800">
      <div class="h-full bg-teal-500 transition-all duration-300" style="width:${progressPct}%"></div>
    </div>
  </div>

  <div class="max-w-3xl mx-auto px-4 mt-6">
    <!-- Tabs -->
    <div class="flex gap-2 mb-6">
      <button onclick="switchTab('standalone')" class="flex-1 py-2.5 px-4 rounded-lg font-semibold text-sm transition-colors ${examState.currentTab === 'standalone' ? 'bg-teal-600 text-white' : 'bg-slate-800 text-slate-400 hover:text-white'}">
        Standalone Q1-Q80
      </button>
      <button onclick="switchTab('case')" class="flex-1 py-2.5 px-4 rounded-lg font-semibold text-sm transition-colors ${examState.currentTab === 'case' ? 'bg-teal-600 text-white' : 'bg-slate-800 text-slate-400 hover:text-white'}">
        Case-Based Q81-Q120
      </button>
    </div>

    <!-- Case selector (when case tab active) -->
    ${examState.currentTab === 'case' ? renderCaseSelector(allQuestions) : ''}

    <!-- Question Card -->
    <div id="question-area" class="question-card">
      ${examState.currentTab === 'standalone' ? renderStandaloneQuestion(allQuestions) : renderCaseQuestion(allQuestions)}
    </div>
  </div>
</div>`;
}

function renderCaseSelector(allQuestions) {
  const cases = getCases();
  let html = '<div class="flex flex-wrap gap-2 mb-4">';
  cases.forEach((c, i) => {
    const isCurrent = examState.caseIndex === i;
    html += `<button onclick="selectCase(${i})" class="px-3 py-1.5 rounded-lg text-xs font-medium transition-colors ${isCurrent ? 'bg-teal-600 text-white' : 'bg-slate-800 text-slate-400 hover:text-teal-400'}">
      Case ${c.id}: Q${c.questions[0].id}-Q${c.questions[c.questions.length-1].id}
    </button>`;
  });
  html += '</div>';
  return html;
}

function renderStandaloneQuestion(allQuestions) {
  const standalone = allQuestions.filter(q => q.caseId === null);
  const q = standalone[examState.currentIndex];
  if (!q) return '<div class="text-center text-slate-400 py-12">No question found.</div>';

  const optLetters = ['A', 'B', 'C', 'D'];
  const selected = examState.answers[q.id];
  const isSubmitted = examState.submitted[q.id];

  return `
    <!-- Question header -->
    <div class="flex items-center justify-between mb-4">
      <span class="inline-flex items-center gap-2">
        <span class="bg-slate-700 text-white px-3 py-1 rounded-full text-sm font-semibold">Q${q.id}</span>
        <span class="text-sm text-slate-400">${q.topic}</span>
      </span>
      <span class="text-sm text-slate-500">${examState.currentIndex + 1} of ${standalone.length}</span>
    </div>

    <!-- Question stem -->
    <div class="bg-slate-800/60 rounded-xl p-5 mb-5">
      <p class="text-white text-lg leading-relaxed">${q.stem}</p>
    </div>

    <!-- Options -->
    <div class="space-y-3 mb-5">
      ${q.opts.map((opt, i) => `
        <button onclick="${isSubmitted ? '' : `selectOption(${q.id}, '${optLetters[i]}', ${i})`}"
          class="opt-btn w-full text-left px-4 py-3.5 rounded-lg flex items-center gap-3 ${getOptionClass(q.id, optLetters[i], i, isSubmitted, q.correct)}">
          <span class="text-sm font-semibold ${getOptionTextColor(optLetters[i], isSubmitted, q.correct)}">${optLetters[i]}.</span>
          <span class="${getOptionTextColor(optLetters[i], isSubmitted, q.correct)}">${opt.slice(3)}</span>
          ${isSubmitted && optLetters[i] === q.correct ? '<span class="ml-auto text-green-400">\u2705</span>' : ''}
          ${isSubmitted && optLetters[i] === selected && selected !== q.correct ? '<span class="ml-auto text-red-400">\u274C</span>' : ''}
        </button>
      `).join('')}
    </div>

    ${isSubmitted ? renderFeedback(q) : renderSubmitButton(q.id)}

    <!-- Navigation -->
    <div class="flex justify-between mt-6">
      <button onclick="navigate(${examState.currentIndex - 1}, 'standalone')"
        class="px-4 py-2 rounded-lg font-medium transition-colors ${examState.currentIndex === 0 ? 'bg-slate-800 text-slate-600 cursor-not-allowed' : 'bg-slate-700 text-white hover:bg-slate-600'}"
        ${examState.currentIndex === 0 ? 'disabled' : ''}>
        \u2190 Previous
      </button>
      <button onclick="navigate(${examState.currentIndex + 1}, 'standalone')"
        class="px-4 py-2 rounded-lg font-medium transition-colors ${examState.currentIndex >= standalone.length - 1 ? 'bg-slate-800 text-slate-600 cursor-not-allowed' : 'bg-slate-700 text-white hover:bg-slate-600'}"
        ${examState.currentIndex >= standalone.length - 1 ? 'disabled' : ''}>
        Next \u2192
      </button>
    </div>`;
}

function renderCaseQuestion(allQuestions) {
  const cases = getCases();
  const ci = examState.caseIndex || 0;
  const c = cases[ci];
  if (!c) return '<div class="text-center text-slate-400 py-12">No case found.</div>';

  const qi = examState.currentCaseQIndex || 0;
  const q = c.questions[qi];
  if (!q) return '<div class="text-center text-slate-400 py-12">No question found.</div>';

  q.caseTitle = c.title;
  q.vignette = c.vignette;
  q.caseId = c.id;

  const optLetters = ['A', 'B', 'C', 'D'];
  const selected = examState.answers[q.id];
  const isSubmitted = examState.submitted[q.id];

  return `
    <!-- Case vignette -->
    <div class="case-vignette rounded-xl p-5 mb-4">
      <div class="flex items-center gap-2 mb-3">
        <span class="text-teal-400 font-bold text-sm">CASE ${c.id}: ${c.title}</span>
        <span class="text-slate-400 text-sm">Q${q.id} of ${c.questions[q ? qi : 0] ? c.questions.length : 0}</span>
      </div>
      <p class="text-slate-200 text-sm leading-relaxed">${c.vignette}</p>
    </div>

    <!-- Question stem -->
    <div class="bg-slate-800/60 rounded-xl p-5 mb-5">
      <div class="flex items-center gap-2 mb-2">
        <span class="bg-slate-700 text-white px-2 py-0.5 rounded-full text-xs font-semibold">Q${q.id}</span>
        <span class="text-xs text-slate-400">${q.topic}</span>
      </div>
      <p class="text-white text-sm leading-relaxed">${q.stem}</p>
    </div>

    <!-- Options -->
    <div class="space-y-3 mb-5">
      ${q.opts.map((opt, i) => `
        <button onclick="${isSubmitted ? '' : `selectOption(${q.id}, '${optLetters[i]}', ${i})`}"
          class="opt-btn w-full text-left px-4 py-3.5 rounded-lg flex items-center gap-3 ${getOptionClass(q.id, optLetters[i], i, isSubmitted, q.correct)}">
          <span class="text-sm font-semibold ${getOptionTextColor(optLetters[i], isSubmitted, q.correct)}">${optLetters[i]}.</span>
          <span class="${getOptionTextColor(optLetters[i], isSubmitted, q.correct)}">${opt.slice(3)}</span>
          ${isSubmitted && optLetters[i] === q.correct ? '<span class="ml-auto text-green-400">\u2705</span>' : ''}
          ${isSubmitted && optLetters[i] === selected && selected !== q.correct ? '<span class="ml-auto text-red-400">\u274C</span>' : ''}
        </button>
      `).join('')}
    </div>

    ${isSubmitted ? renderFeedback(q) : renderSubmitButton(q.id)}

    <!-- Navigation -->
    <div class="flex justify-between mt-6">
      <button onclick="navigate(${qi - 1}, 'case')"
        class="px-4 py-2 rounded-lg font-medium transition-colors ${qi === 0 ? 'bg-slate-800 text-slate-600 cursor-not-allowed' : 'bg-slate-700 text-white hover:bg-slate-600'}"
        ${qi === 0 ? 'disabled' : ''}>
        \u2190 Previous
      </button>
      <button onclick="navigate(${qi + 1}, 'case')"
        class="px-4 py-2 rounded-lg font-medium transition-colors ${qi >= c.questions.length - 1 ? 'bg-slate-800 text-slate-600 cursor-not-allowed' : 'bg-slate-700 text-white hover:bg-slate-600'}"
        ${qi >= c.questions.length - 1 ? 'disabled' : ''}>
        Next \u2192
      </button>
    </div>`;
}

function renderSubmitButton(qId) {
  return `
    <div class="text-center pb-2">
      <button onclick="submitAnswer(${qId})" class="bg-teal-600 hover:bg-teal-500 text-white px-6 py-2 rounded-lg font-semibold transition-colors">
        Submit Answer
      </button>
    </div>`;
}

function renderFeedback(q) {
  const isCorrect = examState.answers[q.id] === q.correct;
  const borderColor = isCorrect ? 'border-green-500' : 'border-red-500';
  const icon = isCorrect ? '\u2705' : '\u274C';
  const statusColor = isCorrect ? 'text-green-400' : 'text-red-400';

  return `
    <div class="feedback-box border ${borderColor} rounded-xl p-4 mt-4">
      <div class="flex items-center gap-2 mb-2">
        <span class="text-lg">${icon}</span>
        <span class="font-semibold ${statusColor}">${isCorrect ? 'Correct!' : `Incorrect — Correct answer: ${q.correct}`}</span>
      </div>
      <p class="text-slate-300 text-sm mb-3">${q.expl}</p>
      <p class="text-teal-400/80 text-xs font-mono">${q.ref}</p>
    </div>`;
}

function getOptionClass(qId, letter, index, isSubmitted, correct) {
  const selected = examState.answers[qId];
  if (!isSubmitted) {
    if (selected === letter) return 'selected';
    return '';
  }
  if (letter === correct) return 'correct';
  if (letter === selected && selected !== correct) return 'wrong';
  return 'disabled';
}

function getOptionTextColor(letter, isSubmitted, correct) {
  if (!isSubmitted) return 'text-white';
  if (letter === correct) return 'text-green-400';
  return 'text-slate-500';
}

function selectOption(qId, letter, index) {
  examState.answers[qId] = letter;
  saveState();
  render();
}

function submitAnswer(qId) {
  if (!examState.answers[qId]) return;
  examState.submitted[qId] = true;
  saveState();
  render();
}

function navigate(newIndex, mode) {
  const standalone = getStandaloneQuestions();
  const cases = getCases();

  if (mode === 'standalone') {
    examState.currentIndex = newIndex;
    examState.currentTab = 'standalone';
    scrollToTop();
  } else {
    const ci = examState.caseIndex || 0;
    const c = cases[ci];
    if (newIndex < 0) {
      if (ci > 0) {
        examState.caseIndex = ci - 1;
        examState.currentCaseQIndex = cases[ci - 1].questions.length - 1;
      } else {
        return;
      }
    } else if (newIndex >= c.questions.length) {
      if (ci < cases.length - 1) {
        examState.caseIndex = ci + 1;
        examState.currentCaseQIndex = 0;
      } else {
        return;
      }
    } else {
      examState.currentCaseQIndex = newIndex;
    }
    examState.currentTab = 'case';
    scrollToTop();
  }
  render();
}

function switchTab(tab) {
  examState.currentTab = tab;
  if (tab === 'standalone') {
    examState.currentIndex = 0;
  } else {
    examState.caseIndex = 0;
    examState.currentCaseQIndex = 0;
  }
  scrollToTop();
  render();
}

function selectCase(index) {
  examState.caseIndex = index;
  examState.currentCaseQIndex = 0;
  scrollToTop();
  render();
}

function scrollToTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function finishExam() {
  if (examState.finished) return;
  examState.finished = true;
  examState.timerRunning = false;
  examState.reviewMode = true;
  if (timerInterval) clearInterval(timerInterval);
  saveState();
  currentMode = 'results';
  render();
}

function renderResultsScreen() {
  const allQuestions = getAllQuestions();
  let correct = 0;
  let total = allQuestions.length;
  const answered = Object.keys(examState.answers).length;

  const topicStats = {};

  allQuestions.forEach(q => {
    const topic = q.topic;
    if (!topicStats[topic]) {
      topicStats[topic] = { correct: 0, total: 0, answered: 0 };
    }
    topicStats[topic].total++;
    topicStats[topic].answered++;
    if (examState.answers[q.id] === q.correct) {
      topicStats[topic].correct++;
      correct++;
    }
  });

  const pct = Math.round((correct / total) * 100);
  const unanswered = total - answered;

  let grade = '';
  let gradeColor = '';
  if (pct >= 80) { grade = 'Excellent'; gradeColor = 'text-green-400'; }
  else if (pct >= 70) { grade = 'Good'; gradeColor = 'text-teal-400'; }
  else if (pct >= 60) { grade = 'Pass'; gradeColor = 'text-yellow-400'; }
  else if (pct >= 50) { grade = 'Borderline'; gradeColor = 'text-orange-400'; }
  else { grade = 'Needs Work'; gradeColor = 'text-red-400'; }

  const weakTopics = Object.entries(topicStats)
    .filter(([_, stats]) => stats.total > 0)
    .map(([name, stats]) => ({
      name,
      pct: Math.round((stats.correct / stats.total) * 100)
    }))
    .sort((a, b) => a.pct - b.pct)
    .slice(0, 3);

  return `
<div class="min-h-screen pb-8">
  <!-- Results Header -->
  <div class="bg-slate-900 border-b border-slate-800">
    <div class="max-w-4xl mx-auto px-4 py-8 text-center">
      <h1 class="text-3xl font-bold text-white mb-2">Exam Complete</h1>
      <div class="text-7xl font-bold ${gradeColor} mb-3">${pct}%</div>
      <p class="text-xl text-slate-300 mb-1">${correct} out of ${total} correct</p>
      <p class="text-lg font-semibold ${gradeColor} mb-4">${grade}</p>
      ${unanswered > 0 ? `<p class="text-yellow-400 text-sm mb-4">${unanswered} unanswered questions marked incorrect</p>` : ''}
      <div class="flex gap-3 justify-center">
        <button onclick="toggleReview()" class="bg-teal-600 hover:bg-teal-500 text-white px-6 py-2 rounded-lg font-semibold transition-colors">Review All Answers</button>
        <button onclick="currentMode='start';render();" class="bg-slate-700 hover:bg-slate-600 text-white px-6 py-2 rounded-lg font-semibold transition-colors">Back to Start</button>
      </div>
    </div>
  </div>

  ${examState.reviewMode ? renderReview(allQuestions) : ''}

  <!-- Topic Breakdown -->
  <div class="max-w-4xl mx-auto px-4 mt-8">
    <h2 class="text-xl font-bold text-white mb-4">Performance by Topic</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
      ${Object.entries(topicStats).map(([name, stats]) => {
        const pct2 = Math.round((stats.correct / stats.total) * 100);
        const color = topicColors[name] || '#94a3b8';
        const emoji = topicEmojis[name] || '';
        return `
        <div class="bg-slate-800/60 rounded-lg p-4">
          <div class="flex items-center justify-between mb-2">
            <span class="text-sm font-semibold text-white">${emoji} ${name}</span>
            <span class="text-sm font-mono" style="color:${color}">${stats.correct}/${stats.total} (${pct2}%)</span>
          </div>
          <div class="h-2 bg-slate-700 rounded-full overflow-hidden">
            <div class="h-full rounded-full" style="width:${pct2}%;background:${color}"></div>
          </div>
        </div>`;
      }).join('')}
    </div>

    <!-- Study Plan -->
    <div class="mt-8 bg-slate-800/40 rounded-xl p-6">
      <h3 class="text-lg font-bold text-white mb-4">Suggested Study Plan</h3>
      ${weakTopics.length > 0 ? `
        <p class="text-slate-300 text-sm mb-3">Focus extra time on these weaker areas:</p>
        <ol class="space-y-2">
          ${weakTopics.map((w, i) => {
            const color = topicColors[w.name] || '#94a3b8';
            const emoji = topicEmojis[w.name] || '';
            return `<li class="flex items-center gap-2 text-sm">
              <span class="font-bold" style="color:${color}">${i + 1}.</span>
              <span class="text-white">${emoji} ${w.name}</span>
              <span class="text-slate-400">(${w.pct}% correct)</span>
              <span class="text-slate-500">— Review Harrison's + Mudit Khanna questions for this topic</span>
            </li>`;
          }).join('')}
        </ol>
      ` : `<p class="text-green-400 text-sm">Great job! All topics performed well. Do a final review pass before the actual exam.</p>`}
      <div class="mt-4 pt-4 border-t border-slate-700">
        <p class="text-slate-400 text-xs">
          General recommendations: Read Harrison's relevant chapters thoroughly. Practice with Mudit Khanna MCQs. Review incorrect answers above. Time yourself on practice sets.
        </p>
      </div>
    </div>

    <!-- Export -->
    <div class="mt-6 text-center">
      <button onclick="exportResults()" class="text-teal-400 hover:text-teal-300 text-sm font-medium transition-colors">
        Export Results to Clipboard
      </button>
    </div>
  </div>
</div>`;
}

function renderReview(allQuestions) {
  let html = `
    <div class="max-w-4xl mx-auto px-4 mt-8">
      <h2 class="text-xl font-bold text-white mb-6">Review All Answers (${allQuestions.length} questions)</h2>`;

  allQuestions.forEach((q, idx) => {
    const userAnswer = examState.answers[q.id];
    const isCorrect = userAnswer === q.correct;
    const borderColor = isCorrect ? 'review-correct' : 'review-wrong';
    const bgClass = userAnswer ? 'bg-slate-800/60' : 'bg-slate-800/30';

    html += `
    <div class="rounded-xl p-5 mb-4 ${bgClass} ${borderColor}">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
          <span class="bg-slate-700 text-white px-2 py-0.5 rounded text-xs font-semibold">${q.caseId ? 'Case ' + q.caseId + ' - ' : ''}Q${q.id}</span>
          <span class="text-xs text-slate-400">${q.topic}</span>
        </div>
        <span class="text-lg">${isCorrect ? '\u2705' : (userAnswer ? '\u274C' : '\u26A0\uFE0F')}</span>
      </div>
      <p class="text-white text-sm mb-3 leading-relaxed">${q.stem}</p>
      <div class="space-y-1.5 mb-3">
        ${q.opts.map((opt, i) => {
          const letter = ['A','B','C','D'][i];
          const optBg = letter === q.correct ? 'bg-green-900/30 border-green-500' : (letter === userAnswer && userAnswer !== q.correct ? 'bg-red-900/30 border-red-500' : 'border-transparent');
          const optColor = letter === q.correct ? 'text-green-400' : (letter === userAnswer && userAnswer !== q.correct ? 'text-red-400' : 'text-slate-400');
          return `<div class="text-sm px-3 py-1.5 rounded border ${optBg} ${optColor}">${opt}</div>`;
        }).join('')}
      </div>
      <div class="text-xs text-slate-400">
        <span class="text-green-400/80 font-semibold">Your answer: ${userAnswer || '—'} | Correct: ${q.correct}</span>
      </div>
      <div class="mt-2 pt-2 border-t border-slate-700/50">
        <p class="text-slate-300 text-xs leading-relaxed">${q.expl}</p>
        <p class="text-teal-400/70 text-xs font-mono mt-1">${q.ref}</p>
      </div>
    </div>`;
  });

  html += '</div>';
  return html;
}

function toggleReview() {
  examState.reviewMode = !examState.reviewMode;
  render();
}

function exportResults() {
  const allQuestions = getAllQuestions();
  let correct = 0;
  let text = `MD Internal Medicine Exit Exam Results\n=====================================\n\n`;
  allQuestions.forEach(q => {
    const userAnswer = examState.answers[q.id] || '—';
    const isCorrect = userAnswer === q.correct;
    if (isCorrect) correct++;
    text += `Q${q.id} ${isCorrect ? '✓' : '✗'} | Your: ${userAnswer} | Correct: ${q.correct} | ${q.topic}\n`;
  });

  text += `\nScore: ${correct}/${allQuestions.length} (${Math.round(correct/allQuestions.length*100)}%)\n`;

  navigator.clipboard.writeText(text).then(() => {
    alert('Results exported to clipboard!');
  }).catch(() => {
    prompt('Copy your results:', text);
  });
}

// Initialize
loadState();
if (examState.answers && Object.keys(examState.answers).length > 0 && !examState.finished) {
  currentMode = 'start';
} else {
  currentMode = 'start';
}
render();

</script>
</body>
</html>
