    "type": "standalone",
    "questions": [
      {"id":1,"stem":"A 28-year-old woman presents with exertional dyspnea and palpitations. Exam reveals an opening snap + diastolic rumble at apex. Pulse is irregularly irregular. Most likely?","opts":["A. Mitral stenosis with atrial fibrillation","B. Mitral regurgitation with sinus tachycardia","C. Tricuspid stenosis with sinus rhythm","D. Aortic regurgitation with atrial flutter"],"correct":"A","expl":"Opening snap + diastolic rumble at apex = mitral stenosis; AF common from LA dilation.","ref":"Mudit Khanna Cardiology Valvular + Harrison's Ch. 273","topic":"Cardiology"},
      {"id":2,"stem":"A 55M with crushing chest pain 2h. ECG: ST↑ in II,III,aVF with reciprocal ST↓ in aVL. Which artery occluded?","opts":["A. Right coronary artery","B. Left anterior descending artery","C. Left circumflex artery","D. Posterior descending artery"],"correct":"A","expl":"Inferior STEMI (II,III,aVF) most commonly RCA.","ref":"Mudit Khanna Cardiology Q89 + Harrison's Ch. 271","topic":"Cardiology"},
      {"id":3,"stem":"A 30M presents with systolic murmur that increases with Valsalva, decreases with squatting. Most likely?","opts":["A. Hypertrophic obstructive cardiomyopathy","B. Mitral valve prolapse","C. Mitral regurgitation","D. Atrium septal defect"],"correct":"A","expl":"Valsalva decreases preload worsening LVOT obstruction murmur increases; squatting increases preload murmur decreases.","ref":"Mudit Khanna Cardiology Murmur Maneuvers + Harrison's Ch. 268","topic":"Cardiology"},
      {"id":4,"stem":"A 48F with fever, fatigue, new holosystolic murmur at apex. Blood cultures grow S. aureus. Strongest predictor of embolic events in IE?","opts":["A. Vegetation size >10mm","B. Fever >10 days","C. Elevated CRP level","D. Rheumatoid factor positive"],"correct":"A","expl":"Vegetation >10mm = strongest independent predictor of embolic events.","ref":"Harrison's Ch. 173 + Mudit Khanna Cardiology IE","topic":"Cardiology"},
      {"id":5,"stem":"A 62M with severe AS presents with syncope on exertion + angina. Definitive management?","opts":["A. Aortic valve replacement surgery","B. Balloon aortic valvuloplasty","C. Medical therapy with nitrates","D. Beta-blocker and diuretic therapy"],"correct":"A","expl":"Symptomatic severe AS (angina, syncope, HF) = Class I indication for AVR.","ref":"Harrison's Ch. 274 + Mudit Khanna Cardiology Valvular","topic":"Cardiology"},
      {"id":6,"stem":"A 45M with sudden severe dyspnea. BP 180/100, RR 32. Bilateral crackles to mid-zones. S3 gallop. Pulsus alternans. First-line management?","opts":["A. Intravenous furosemide and nitroglycerin","B. Intravenous amiodarone infusion","C. Oral metoprolol and enalapril","D. Sublingual nifedipine and oxygen"],"correct":"A","expl":"Acute pulmonary edema with hypertensive crisis: IV loop diuretics + nitrates for preload/afterload reduction.","ref":"Harrison's Ch. 275 + Mudit Khanna Cardiology Acute HF","topic":"Cardiology"},
      {"id":7,"stem":"A 28F from rural village with migratory polyarthritis followed by chest pain and dyspnea. Exam: pericardial friction rub + pansystolic murmur at apex. Criteria used?","opts":["A. Jones criteria for ARF","B. Modified Duke criteria for IE","C. Framingham criteria for HF","D. Bethesda criteria for rheumatic disease"],"correct":"A","expl":"Migratory polyarthritis + carditis (pericarditis + MR) = acute rheumatic fever; diagnosed by Jones criteria.","ref":"Mudit Khanna Cardiology Rheumatic Fever + Harrison's Ch. 381","topic":"Cardiology"},
      {"id":8,"stem":"A 50M on warfarin for AF presents with INR 5.8 without bleeding. Most appropriate management?","opts":["A. Withhold warfarin and resume at lower dose","B. Administer IV vitamin K immediately","C. Give fresh frozen plasma transfusion","D. Continue current warfarin dosage"],"correct":"A","expl":"INR 4.5-10 without bleeding: withhold warfarin, resume at lower dose.","ref":"ACCP guidelines + Harrison's Anticoagulation chapter","topic":"Cardiology"},
      {"id":9,"stem":"A 40M with chest pain, dyspnea, distended neck veins. BP 80/50. Heart sounds distant. Pulsus paradoxus 18mmHg. Most likely diagnosis?","opts":["A. Cardiac tamponade","B. Constrictive pericarditis","C. Right ventricular infarction","D. Massive pulmonary embolism"],"correct":"A","expl":"Beck's triad (hypotension, JVD, muffled heart sounds) + pulsus paradoxus >10 = tamponade.","ref":"Mudit Khanna Cardiology Q112 + Harrison's Ch. 278","topic":"Cardiology"},
      {"id":10,"stem":"A 35F with recurrent palpitations 10-15min. ECG: narrow complex tachycardia 180bpm regular. Vagal maneuvers failed. Drug of choice?","opts":["A. Intravenous adenosine 6mg rapid bolus","B. Intravenous amiodarone loading dose","C. Oral propranolol 40mg stat","D. Intravenous atropine 0.5mg"],"correct":"A","expl":"IV adenosine = drug of choice for acute SVT termination; rapid IV push + saline flush.","ref":"Mudit Khanna Arrhythmias + Harrison's Ch. 263","topic":"Cardiology"},
      {"id":11,"stem":"Which medication reduces mortality in HFrEF?","opts":["A. Spironolactone","B. Digoxin","C. Furosemide","D. Isosorbide dinitrate alone"],"correct":"A","expl":"Aldosterone antagonists (spironolactone) reduce mortality in HFrEF per RALES trial; ACEi/ARB/ARNI + BB + MRA = pillar therapy.","ref":"Harrison's Ch. 276","topic":"Cardiology"},
      {"id":12,"stem":"A 22M presents with fixed split S2 + SEM at LUSB. ECG: incomplete RBBB. Most likely?","opts":["A. Ostium secundum atrial septal defect","B. Tetralogy of Fallot","C. Ventricular septal defect","D. Patent ductus arteriosus"],"correct":"A","expl":"Fixed split S2 + SEM at LUSB + RBBB = ASD (secundum).","ref":"Mudit Khanna Cardiology Congenital + Harrison's Ch. 280","topic":"Cardiology"},
      {"id":13,"stem":"A 58M presents 4.5h after crushing chest pain. ECG: ST↑ V1-V6. Troponin unavailable. BP 100/60. Most appropriate management?","opts":["A. Streptokinase 1.5 million units IV over 60 minutes","B. Aspirin and transfer for primary PCI","C. Sublingual nitroglycerin only","D. Morphine and wait for troponin results"],"correct":"A","expl":"Where PCI not available within 120min, thrombolysis with streptokinase indicated for STEMI within 12h.","ref":"Harrison's Ch. 272 + regional ACS guidelines","topic":"Cardiology"},
      {"id":14,"stem":"A 38M presents with cough, low-grade fever, night sweats 6wks, 5kg weight loss. CXR: cavitary lesion RUL. Sputum GeneXpert: MTB+, rifampicin-sensitive. Initial treatment?","opts":["A. 2HRZE + 4HR (6 months total)","B. 2HRZES + 1HRZE + 5HRE","C. Isoniazid monotherapy for 9 months","D. 2 months levofloxacin + ethambutol"],"correct":"A","expl":"Drug-susceptible pulmonary TB: 2HRZE (intensive) + 4HR (continuation) = 6 months total.","ref":"WHO + Regional TB Guidelines + Harrison's Ch. 206","topic":"Pulmonology"},
      {"id":15,"stem":"A 65M with COPD presents with increased dyspnea, cough, purulent sputum 3d. RR 24. ABG: pH 7.32, PaCO2 58, PaO2 55, HCO3 28. Type of respiratory failure?","opts":["A. Type II acute-on-chronic hypercapnic","B. Type I hypoxemic failure only","C. Type III perioperative failure","D. Type IV shock-related failure"],"correct":"A","expl":"Elevated PaCO2 >45 + acidemia (pH <7.35) + hypoxemia = Type II (hypercapnic) respiratory failure in COPD exacerbation.","ref":"Harrison's Ch. 329 + Mudit Khanna Pulmonology","topic":"Pulmonology"},
      {"id":16,"stem":"A 30F with sudden-onset right-sided chest pain + dyspnea. Exam: absent breath sounds, hyper-resonant percussion right side, tracheal deviation to left. Most appropriate immediate step?","opts":["A. Immediate chest tube thoracostomy","B. Needle thoracostomy at 2nd intercostal space","C. High-flow oxygen and observation","D. CT chest for confirmation before intervention"],"correct":"B","expl":"Tension pneumothorax: immediate needle decompression at 2nd ICS MCL is life-saving; do NOT wait for imaging.","ref":"Harrison's Ch. 322 + ATLS","topic":"Pulmonology"},
      {"id":17,"stem":"A 50F with progressive bilateral exertional dyspnea 1yr. CT: bilateral reticulonodular opacities with honeycombing. PFTs most likely show?","opts":["A. Restrictive pattern with low DLCO","B. Obstructive pattern with low DLCO","C. Restrictive pattern with normal DLCO","D. Mixed pattern with increased DLCO"],"correct":"A","expl":"IPF: restrictive PFTs (decreased FVC, decreased TLC, increased FEV1/FVC) + reduced DLCO.","ref":"Harrison's Ch. 325 + Mudit Khanna Pulmonology ILD","topic":"Pulmonology"},
      {"id":18,"stem":"A 45F evaluated for left-sided pleural effusion. Thoracentesis: pleural protein 3.8 (serum 5.8), pleural LDH 180 (serum 240), WBC 2500 with 70% lymphs, ADA 58. Most consistent with?","opts":["A. Tuberculous pleuritis","B. Heart failure effusion","C. Parapneumonic effusion","D. Malignant pleural effusion"],"correct":"A","expl":"Exudative (protein PS 0.66 >0.5), lymphocyte-predominant + ADA >40 = TB pleuritis in endemic areas.","ref":"Mudit Khanna Pulmonology Q205 + Harrison's Ch. 318","topic":"Pulmonology"},
      {"id":19,"stem":"A 32M with HIV (CD4 180) presents with progressive dyspnea, dry cough, fever 2wks. CXR: bilateral perihilar infiltrates. Most likely organism?","opts":["A. Pneumocystis jirovecii","B. Mycobacterium tuberculosis","C. Streptococcus pneumoniae","D. Cryptococcus neoformans"],"correct":"A","expl":"PJP classically: subacute dyspnea, dry cough, bilateral perihilar infiltrates in HIV with CD4 <200.","ref":"Harrison's Ch. 227 + Mudit Khanna Pulmonology","topic":"Pulmonology"},
      {"id":20,"stem":"A 70F on post-op day 5 after hip replacement develops sudden dyspnea, tachycardia, pleuritic chest pain. Wells score = 6. Most appropriate next step?","opts":["A. CT pulmonary angiography","B. D-dimer testing to rule out","C. Bilateral lower limb venous Doppler only","D. Empiric antibiotic therapy"],"correct":"A","expl":"Wells >4 = PE likely; proceed directly to CTPA not D-dimer.","ref":"Harrison's Ch. 310 + Mudit Khanna Pulmonology PE","topic":"Pulmonology"},
      {"id":21,"stem":"A 25M with recurrent wheezing + breathlessness 3-4x/wk, worse at night. Uses salbutamol daily. Spirometry: FEV1/FVC 0.69, reversible >12%. GINA step therapy?","opts":["A. Step 3: low-dose ICS-formoterol maintenance","B. Step 1: SABA as needed only","C. Step 5: high-dose ICS-LABA + oral steroids","D. Step 2: daily oral leukotriene modifier"],"correct":"A","expl":"Daily symptoms + night symptoms >1x/wk + reduced FEV1 = moderate persistent asthma = GINA Step 3.","ref":"Mudit Khanna Pulmonology Asthma + GINA 2025","topic":"Pulmonology"},
      {"id":22,"stem":"Which ABG indicates primary metabolic acidosis with appropriate respiratory compensation?","opts":["A. pH 7.28, PaCO2 28, HCO3 14","B. pH 7.32, PaCO2 50, HCO3 26","C. pH 7.48, PaCO2 30, HCO3 22","D. pH 7.30, PaCO2 44, HCO3 18"],"correct":"A","expl":"Primary met acidosis: low pH + low HCO3; expected PaCO2 = 1.5(HCO3)+8 plus/minus 2 = 29 plus/minus 2 -- measured 28 confirms appropriate compensation.","ref":"Harrison's Acid-Base chapter + Mudit Khanna Q240","topic":"Pulmonology"},
      {"id":23,"stem":"A 55M with 30 pack-year smoking history presents with chronic productive cough 5mo/yr over 3yrs. PFTs: FEV1/FVC 0.61, FEV1 55% pred. GOLD staging?","opts":["A. GOLD 2B or 2E depending on symptoms/exacerbations","B. GOLD 1A with mild obstruction only","C. GOLD 3 with severe airflow limitation","D. GOLD 4 with respiratory failure"],"correct":"A","expl":"FEV1 50-79% = GOLD 2 (moderate); symptomatic with chronic productive cough = group B or E depending on exacerbations.","ref":"Harrison's Ch. 302 + Mudit Khanna Pulmonology COPD","topic":"Pulmonology"},
      {"id":24,"stem":"A 40M with hemoptysis, fever, cavitary lung lesions. Works as farmer. Most important initial investigation?","opts":["A. Sputum examination for acid-fast bacilli","B. Bronchoscopy with biopsy","C. High-resolution CT of thorax","D. Serum galactomannan antigen"],"correct":"A","expl":"In TB-endemic settings: hemoptysis + cavity + fever = pulmonary TB until proven otherwise; sputum AFB/GeneXpert first-line.","ref":"Mudit Khanna Pulmonology TB + Harrison's Ch. 206","topic":"Pulmonology"},
      {"id":25,"stem":"A 60M presents ARDS secondary to severe pneumonia. Mechanical ventilation initiated. Which strategy improves survival?","opts":["A. Low tidal volume (6 mL/kg ideal body weight)","B. High tidal volume (12 mL/kg ideal body weight)","C. Pressure-controlled inverse ratio ventilation","D. High PEEP with normal tidal volume"],"correct":"A","expl":"Low tidal volume (6 mL/kg IBW) reduces mortality in ARDS per ARDSNet trial.","ref":"Harrison's Ch. 321 + Mudit Khanna Pulmonology ARDS","topic":"Pulmonology"},
      {"id":26,"stem":"A 50M with clubbing, central cyanosis, dyspnea. O2 sat 88% on room air, does NOT improve with 100% O2. Mechanism of hypoxemia?","opts":["A. Right-to-left intracardiac shunt","B. Hypoventilation at alveolar level","C. Mild V/Q mismatch","D. High altitude-induced hypoxemia"],"correct":"A","expl":"Failure of hypoxemia to correct with 100% O2 = anatomic right-to-left shunt (e.g. Eisenmenger).","ref":"Harrison's Ch. 329 + Mudit Khanna Pulmonology","topic":"Pulmonology"},
      {"id":27,"stem":"A 68M with sudden-onset right-sided weakness + aphasia. Last known well 2h ago. CT head: no hemorrhage. BP 160/90. Glucose 110. Most appropriate next step?","opts":["A. Intravenous alteplase thrombolysis","B. Aspirin and clopidogrel dual therapy","C. CT angiography before any treatment","D. Supportive care only and observe"],"correct":"A","expl":"Acute ischemic stroke within 4.5h window, no hemorrhage on CT: IV alteplase (0.9 mg/kg) indicated.","ref":"Mudit Khanna Neurology Stroke + Harrison's Ch. 427","topic":"Neurology"},
      {"id":28,"stem":"A 22F with fever, headache, neck stiffness 2d. Mildly confused. CSF: protein 180, glucose 25, WBC 350 with lymph predominance. Most likely?","opts":["A. Tuberculous meningitis","B. Bacterial (pneumococcal) meningitis","C. Viral (enteroviral) meningitis","D. Cryptococcal meningitis"],"correct":"A","expl":"Subacute onset + moderate pleocytosis with lymph predominance + very high protein + very low glucose = classic TB meningitis CSF.","ref":"Mudit Khanna Neurology TB meningitis + Harrison's Ch. 433","topic":"Neurology"},
      {"id":29,"stem":"A 55M presents with recurrent right-sided temporal headache, watering and redness of right eye, nasal congestion. Each episode 45min, same time nightly. Most effective acute treatment?","opts":["A. High-flow oxygen by non-rebreathing mask","B. Sumatriptan oral tablet 50mg stat","C. Paracetamol 1g with codeine","D. Flunarizine preventive tablet daily"],"correct":"A","expl":"Cluster headache: acute treatment = 100% O2 at 12L/min via non-rebreathing mask.","ref":"Mudit Khanna Neurology Headache + Harrison's Ch. 430","topic":"Neurology"},
      {"id":30,"stem":"A 30F with fluctuating ptosis + diplopia worse in evenings and after prolonged talking. Repetitive nerve stimulation shows decremental response. Initial pharmacotherapy?","opts":["A. Pyridostigmine 60mg orally","B. Prednisone 60mg orally","C. Intravenous immunoglobulin","D. Thymectomy referral alone"],"correct":"A","expl":"Myasthenia gravis: initial symptomatic tx = acetylcholinesterase inhibitor (pyridostigmine); immunosuppression for refractory cases.","ref":"Mudit Khanna Neurology MG + Harrison's Ch. 450","topic":"Neurology"},
      {"id":31,"stem":"A 25M on carbamazepine for 2yrs presents with hyponatremia (Na 125). Mechanism?","opts":["A. SIADH from carbamazepine effect","B. Primary adrenal insufficiency","C. Excessive free water intake","D. Cerebral salt wasting syndrome"],"correct":"A","expl":"Carbamazepine is well-known cause of SIADH leading to euvolemic hyponatremia.","ref":"Harrison's Ch. 360 + Mudit Khanna Neurology AEDs","topic":"Neurology"},
      {"id":32,"stem":"A 45M with ascending weakness 4d following URI. DTRs absent. CSF protein 95, WBC 5. NCS shows demyelinating polyneuropathy. Most likely?","opts":["A. Guillain-Barre syndrome (AIDP)","B. Acute intermittent porphyria","C. Heavy metal poisoning","D. Tick paralysis ascending variant"],"correct":"A","expl":"Ascending weakness + areflexia + albuminocytologic dissociation + post-infectious + demyelinating = AIDP-GBS.","ref":"Mudit Khanna Neurology GBS + Harrison's Ch. 452","topic":"Neurology"},
      {"id":33,"stem":"A 72M with 6-mo history progressive memory loss, visual hallucinations, fluctuating alertness. Also has asymmetric rigidity + bradykinesia. Most likely?","opts":["A. Dementia with Lewy bodies","B. Alzheimer's disease with late psychosis","C. Vascular dementia with pseudoparkinsonism","D. Normal pressure hydrocephalus triad"],"correct":"A","expl":"Dementia + visual hallucinations + fluctuating cognition + parkinsonian features = DLB per revised criteria; no significant motor features before dementia.","ref":"Mudit Khanna Neurology Dementia + Harrison's Ch. 442","topic":"Neurology"},
      {"id":34,"stem":"A 40F with sudden-onset 'thunderclap' headache 'worst of my life.' CT head negative. Most appropriate next investigation?","opts":["A. Lumbar puncture for xanthochromia","B. CT angiography of cerebral vessels","C. MRI brain with DWI","D. Routine EEG for seizure exclusion"],"correct":"A","expl":"Thunderclap headache = SAH until proven otherwise; if CT negative, LP for xanthochromia mandatory to rule out SAH.","ref":"Mudit Khanna Neurology Q290 + Harrison's Ch. 430","topic":"Neurology"},
      {"id":35,"stem":"A 60M with DM2 presents with symmetric stocking-glove sensory loss, absent ankle reflexes, burning pain in feet worse at night. NCS: absent sural sensory response. First-line symptomatic treatment?","opts":["A. Pregabalin 75mg orally twice daily","B. Tramadol 50mg as needed for pain","C. Amitriptyline 10mg at night","D. Vitamin B12 supplementation alone"],"correct":"A","expl":"Pregabalin, gabapentin, or duloxetine = first-line for painful diabetic neuropathy; pregabalin often preferred for tolerability.","ref":"Harrison's Ch. 453 + Mudit Khanna Neuropathy","topic":"Neurology"},
      {"id":36,"stem":"A 50M with DM presents with 3d oliguria. Creatinine rose from 1.2 to 3.8 over 72h. FeNa 3.2%. UA: muddy brown granular casts. Most likely?","opts":["A. Acute tubular necrosis","B. Prerenal","C. Acute interstitial nephritis","D. Post-renal obstruction"],"correct":"A","expl":"FeNa >2% + muddy brown casts + rising Cr = ATN (intrinsic AKI).","ref":"Mudit Khanna Nephrology Q220 + Harrison's Ch. 312","topic":"Nephrology"},
      {"id":37,"stem":"A 45M presents with severe muscle weakness + palpitations. ECG: tall peaked T-waves, widened QRS, absent P-waves. K+ 7.2. Most appropriate first step?","opts":["A. Intravenous calcium gluconate","B. Intravenous regular insulin with glucose","C. Nebulized salbutamol 10mg","D. Sodium polystyrene sulfonate orally"],"correct":"A","expl":"Severe hyperkalemia with ECG changes: IV calcium gluconate FIRST to stabilize cardiac membrane; prevents arrhythmia.","ref":"Mudit Khanna Nephrology Q270 + Harrison's Ch. 60","topic":"Nephrology"},
      {"id":38,"stem":"A 70M with CKD stage 3 presents with fatigue, bone pain, anorexia. Hb 8.5 with normocytic normochromic anemia. What causes his anemia?","opts":["A. Decreased erythropoietin production","B. Chronic blood loss from GI tract","C. Folic acid deficiency in diet","D. Hemolysis from uremic toxins"],"correct":"A","expl":"EPO deficiency = primary cause of anemia of CKD; other contributors: shortened RBC survival, iron deficiency, uremia.","ref":"Mudit Khanna Nephrology CKD + Harrison's Ch. 315","topic":"Nephrology"},
      {"id":39,"stem":"A 20M presents 3d after sore throat with cola-colored urine, periorbital edema, BP 155/95. UA: RBC casts + proteinuria. ASO elevated, C3 low. Most likely?","opts":["A. Post-streptococcal glomerulonephritis","B. IgA nephropathy Berger disease","C. RPGN","D. Lupus nephritis WHO class IV"],"correct":"A","expl":"Post-infectious GN: 1-3wks after strep + nephritic syndrome + low C3 + elevated ASO.","ref":"Mudit Khanna Nephrology GN + Harrison's Ch. 315","topic":"Nephrology"},
      {"id":40,"stem":"A 35F with polyuria, polydipsia, profound weakness. Na 152, urine osm 210. After 6h water deprivation, urine osm stays at 200. After DDAVP, urine osm rises to 450. Most likely?","opts":["A. Central diabetes insipidus","B. Nephrogenic diabetes insipidus","C. Primary psychogenic polydipsia","D. Osmotic diuresis glucosuria"],"correct":"A","expl":"Failure to concentrate with water deprivation + significant rise after DDAVP = central DI (renal responds to exogenous ADH).","ref":"Harrison's Ch. 382","topic":"Nephrology"},
      {"id":41,"stem":"A 50M with CKD stage 4 presents with bone pain + fractures. Ca 8.8, Phos 5.8, PTH 620, AlkPhos 480. Management includes all EXCEPT:","opts":["A. Calcium and vitamin D analogs","B. Phosphate binders and dietary restriction","C. Sevelamer for control of serum","D. Immediate parathyroidectomy surgery"],"correct":"D","expl":"Initial management = medical: phosphate binders, vitamin D analogs, calcimimetics; surgery for refractory severe cases.","ref":"Mudit Khanna Nephrology CKD-Bone Mineral + Harrison's Ch. 315","topic":"Nephrology"},
      {"id":42,"stem":"A 28F with metabolic acidosis. ABG: pH 7.28, PaCO2 30, HCO3 14. Serum: Na 140, K 4.0, Cl 114, HCO3 14. AG 12. Urine AG positive. Most likely?","opts":["A. Distal (type 1) renal tubular acidosis","B. Proximal (type 2) RTA","C. Diarrhea-induced normal AG acidosis","D. Lactic acidosis from sepsis"],"correct":"A","expl":"Normal AG met acidosis + positive urine AG (impaired NH4+ excretion) = distal RTA (type 1): urine pH >5.5.","ref":"Mudit Khanna Nephrology Acid-Base RTA + Harrison's Ch. 320","topic":"Nephrology"},
      {"id":43,"stem":"A 42M DM with nephrotic syndrome. Biopsy most characteristic of diabetic nephropathy?","opts":["A. Kimmelstiel-Wilson nodular glomerulosclerosis","B. IgA deposits with mesangial proliferation","C. Subepithelial humps on dense deposits","D. Crescents with capsular rupture"],"correct":"A","expl":"K-W nodules = pathognomonic lesion of diabetic nephropathy (nodular glomerulosclerosis).","ref":"Mudit Khanna Nephrology DM nephropathy + Harrison's Ch. 315","topic":"Nephrology"},
      {"id":44,"stem":"A 55F with nephrotic syndrome presents with sudden right flank pain + macroscopic hematuria. Urine protein 8g/day. Which complication most likely?","opts":["A. Renal vein thrombosis","B. Acute pyelonephritis ascending","C. Ruptured renal cyst hemorrhage","D. Transitional cell carcinoma"],"correct":"A","expl":"Nephrotic syndrome (esp. membranous) leading to renal vein thrombosis (hypercoagulable from loss of AT-III).","ref":"Mudit Khanna Nephrology Nephrotic + Harrison's Ch. 315","topic":"Nephrology"},
      {"id":45,"stem":"A 50M with cirrhosis presents with hematemesis. BP 85/50, HR 120/min. After IV fluids, most appropriate pharmacological therapy?","opts":["A. Intravenous terlipressin","B. Oral propranolol maintenance dose","C. Intravenous ranitidine infusion","D. Oral sucralfate suspension"],"correct":"A","expl":"Acute variceal bleed: IV vasoactive drugs (terlipressin/somatostatin/octreotide) immediately + IV ceftriaxone for prophylaxis + urgent endoscopic banding.","ref":"Harrison's Ch. 333 + Mudit Khanna Gastro UGIB","topic":"Gastroenterology"},
      {"id":46,"stem":"A 40M with epigastric pain worse on empty stomach, relieved by food. Endoscopy: duodenal ulcer. H. pylori+ on biopsy. Recommended first-line eradication?","opts":["A. PPI + clarithromycin + amoxicillin x 14 days","B. PPI monotherapy for total 8 weeks","C. Bismuth subsalicylate alone for 2 weeks","D. Sucralfate + famotidine for 6 weeks"],"correct":"A","expl":"First-line: PPI-based triple therapy (PPI + clarithro + amox/metronidazole) x14d; bismuth quadruple in high clarithro resistance areas.","ref":"Mudit Khanna Gastro UGIB + Harrison's Ch. 333","topic":"Gastroenterology"},
      {"id":47,"stem":"A 55M with acute severe epigastric pain radiating to back, nausea, vomiting. Lipase 800. Ranson's criterion at admission?","opts":["A. Age >55 years","B. Blood glucose >200 mg/dL","C. Serum calcium <8 mg/dL","D. Hematocrit fall of >10%"],"correct":"A","expl":"Ranson's at admission: GA LAW (Glucose>200, Age>55, LDH>350, AST>250, WBC>16K). Others measured at 48h.","ref":"Mudit Khanna Gastro Pancreatitis + Harrison's Ch. 328","topic":"Gastroenterology"},
      {"id":48,"stem":"A 65M with cirrhosis presents with increasing abdominal distension. Paracentesis: total protein 1.2, SAAG 1.8, PMN 450. Most appropriate next step?","opts":["A. Start cefotaxime 2g IV q8h","B. Schedule therapeutic paracentesis","C. Start oral spironolactone + furosemide","D. Wait for culture results before antibiotics"],"correct":"A","expl":"SBP diagnosed when PMN >250; start empirical cefotaxime/ceftriaxone immediately + IV albumin (1.5g/kg day 1, 1g/kg day 3).","ref":"Mudit Khanna Gastro SBP Q230 + Harrison's Ch. 331","topic":"Gastroenterology"},
      {"id":49,"stem":"A 35M with 4-month history bloody diarrhea, abdominal pain, tenesmus. Colonoscopy: continuous mucosal inflammation from rectum to sigmoid. Biopsy: crypt abscesses. Most likely?","opts":["A. Ulcerative colitis","B. Crohn's disease terminal ileum","C. Bacillary dysentery Shigella","D. Intestinal tuberculosis"],"correct":"A","expl":"Continuous colonic inflammation from rectum + crypt abscesses + bloody diarrhea = ulcerative colitis.","ref":"Mudit Khanna Gastro IBD + Harrison's Ch. 336","topic":"Gastroenterology"},
      {"id":50,"stem":"A 45F with painless jaundice, pruritus, fatigue. Labs: ALP 480, bili 2.5, AST/ALT normal. AMA strongly positive 1:640. Most likely?","opts":["A. Primary biliary cholangitis","B. Primary sclerosing cholangitis","C. Autoimmune hepatitis type I","D. Choledocholithiasis"],"correct":"A","expl":"Middle-aged woman + cholestatic pattern + AMA+ = primary biliary cholangitis.","ref":"Mudit Khanna Hepatology Cholestatic + Harrison's Ch. 337","topic":"Gastroenterology"},
      {"id":51,"stem":"A 28M for HBV screening. Serology: HBsAg+, anti-HBc(tot)+, anti-HBs-, HBeAg+, anti-HBe-. Pattern consistent with?","opts":["A. Chronic hepatitis B with active replication","B. Acute hepatitis B early window phase","C. Resolved natural infection with immunity","D. Vaccinated individual without infection"],"correct":"A","expl":"HBsAg+ + total anti-HBc+ + HBeAg+ = chronic HBV with active viral replication; anti-HBs- = non-resolved.","ref":"Mudit Khanna Hep B serology table + Harrison's Ch. 341","topic":"Gastroenterology"},
      {"id":52,"stem":"A 60M with painless progressive jaundice 6wks + palpable gallbladder. Courvoisier's sign indicates?","opts":["A. Malignant obstruction of common bile duct","B. Gallstone in common bile duct","C. Stricture of intrahepatic bile ducts","D. Acute inflammation of gallbladder"],"correct":"A","expl":"Painless jaundice + palpable gallbladder (Courvoisier's) = malignant biliary obstruction (typically pancreatic head CA) vs gallstone (fibrotic gallbladder, not palpable).","ref":"Harrison's Ch. 38","topic":"Gastroenterology"},
      {"id":53,"stem":"A 40M with hematemesis after binge alcohol vomiting began AFTER vomiting episodes. Most likely?","opts":["A. Mallory-Weiss tear","B. Esophageal variceal rupture","C. Peptic ulcer with perforation","D. Dieulafoy's lesion bleeding"],"correct":"A","expl":"Hematemesis AFTER episodes of forceful vomiting (classically post-alcohol) = Mallory-Weiss tear (longitudinal mucosal tear at GE junction).","ref":"Mudit Khanna Gastro UGIB + Harrison's Ch. 337","topic":"Gastroenterology"},
      {"id":54,"stem":"A 25F with severe fatigue and pallor. Hb 6.8, MCV 68, ferritin 8, TIBC 420. PS: microcytic hypochromic with pencil cells. Most likely?","opts":["A. Iron deficiency anemia","B. Thalassemia minor trait","C. Anemia of chronic disease","D. Sideroblastic anemia acquired"],"correct":"A","expl":"Microcytic anemia + low ferritin + high TIBC + pencil cells = IDA; ferritin most sensitive single indicator of iron stores.","ref":"Mudit Khanna Heme Anemia + Harrison's Ch. 115","topic":"Hematology"},
      {"id":55,"stem":"A 10M boy from malaria-endemic region presents with jaundice + dark urine 2d after starting antimalarial. PS: bite cells + Heinz bodies. G6PD low. Type of hemolysis?","opts":["A. G6PD deficiency with oxidative stress","B. Sickle cell anemia vaso-occlusive crisis","C. Autoimmune hemolytic anemia warm type","D. Hereditary spherocytosis with fragility"],"correct":"A","expl":"Bite cells + Heinz bodies + hemolysis after oxidative drug (antimalarials) = acute hemolysis in G6PD deficiency.","ref":"Mudit Khanna Heme Hemolytic + Harrison's Ch. 122","topic":"Hematology"},
      {"id":56,"stem":"A 30F with petechiae + easy bruising. Platelets 15K. PT/aPTT normal. PS: isolated decreased platelets normal morphology. No hepatosplenomegaly. Most likely?","opts":["A. ITP","B. DIC","C. TTP","D. Acute promyelocytic leukemia"],"correct":"A","expl":"Isolated thrombocytopenia + normal PT/aPTT + no other findings = ITP (diagnosis of exclusion).","ref":"Mudit Khanna Heme Q245 + Harrison's Ch. 125","topic":"Hematology"},
      {"id":57,"stem":"A 40M with fatigue + splenomegaly. WBC 180K with full spectrum of myeloid cells + basophilia. BCR-ABL+. Most likely?","opts":["A. Chronic myeloid leukemia (CML)","B. Acute myeloid leukemia","C. Leukemoid reaction","D. Primary myelofibrosis"],"correct":"A","expl":"Markedly increased WBC + full granulocytic spectrum + basophilia + splenomegaly + BCR-ABL = CML chronic phase.","ref":"Mudit Khanna Heme Leukemia + Harrison's Ch. 118","topic":"Hematology"},
      {"id":58,"stem":"A 65M with bone pain, recurrent infections, renal failure. Hb 8.2, Ca 11.8, Cr 2.8. SPEP: M-spike 3.2g/dL. UBPJ+. Diagnosis?","opts":["A. Multiple myeloma","B. Chronic lymphocytic leukemia","C. Waldenstrom's macroglobulinemia","D. MGUS"],"correct":"A","expl":"CRAB (increased Ca, renal failure, anemia, bone lesions) + M-spike >3.0 + BJ proteinuria = MM.","ref":"Mudit Khanna Heme MM + Harrison's Ch. 123","topic":"Hematology"},
      {"id":59,"stem":"A 50F with prolonged aPTT 58sec that corrects to normal on 1:1 mixing immediately but prolongs again after 2h incubation. Indicates?","opts":["A. Factor VIII inhibitor (acquired hemophilia)","B. Heparin contamination of specimen","C. Severe liver synthetic dysfunction","D. Vitamin K antagonist oral effect"],"correct":"A","expl":"Delayed prolongation after 2h incubation = factor VIII inhibitor (acquired hemophilia A).","ref":"Mudit Khanna Heme Coagulation mixing + Harrison's Ch. 125","topic":"Hematology"},
      {"id":60,"stem":"A 20F with polyuria, polydipsia, weight loss 2wks. Drowsy, tachypneic with Kussmaul breathing. Glucose 480, pH 7.15, HCO3 8, urine ketones 3+. First step in management?","opts":["A. Aggressive IV isotonic saline resuscitation","B. IV regular insulin bolus + infusion","C. IV sodium bicarbonate infusion","D. IV potassium chloride supplementation"],"correct":"A","expl":"In DKA: IV fluid resuscitation with NS is FIRST step (before insulin); fluids alone lower glucose significantly and restore perfusion.","ref":"Harrison's Ch. 401 + Mudit Khanna Endocrinology DKA","topic":"Endocrinology"},
      {"id":61,"stem":"A 28F with heat intolerance, weight loss, palpitations, tremor. Diffuse goiter + bruit + mild exophthalmos. TSH <0.01, free T4 3.8. Most appropriate initial treatment?","opts":["A. Methimazole 20mg daily","B. Radioactive iodine ablation","C. Total thyroidectomy","D. Propranolol monotherapy only"],"correct":"A","expl":"Graves' disease: methimazole (carbimazole) preferred initial (less teratogenic than PTU except 1st trimester).","ref":"Harrison's Ch. 404 + Mudit Khanna Endocrinology","topic":"Endocrinology"},
      {"id":62,"stem":"A 45M T2DM on metformin 1g BID + glimepiride 4mg has HbA1c 8.2%. BMI 32. Add which medication next?","opts":["A. Empagliflozin 10mg once daily","B. Basal insulin glargine at bedtime","C. Repaglinide before each meal","D. Sitagliptin 100mg daily with food"],"correct":"A","expl":"T2DM with obesity + ASCVD risk: SGLT2i preferred 2nd line (weight loss + cardiorenal benefit).","ref":"ADA 2025 + Harrison's Ch. 410 + Mudit Khanna Endocrinology T2DM","topic":"Endocrinology"},
      {"id":63,"stem":"A 45F with progressive proximal weakness, central obesity, purple striae, new DM. AM cortisol 22, ACTH 85, overnight DST: no suppression. Next step?","opts":["A. 8mg overnight DST","B. MRI of the pituitary gland","C. CT of adrenal glands","D. Late-night salivary cortisol"],"correct":"A","expl":"ACTH-dependent Cushing's (ACTH 85 + high cortisol): 8mg DST differentiates pituitary (suppresses) from ectopic (doesn't suppress).","ref":"Harrison's Ch. 407 + Mudit Khanna Endocrinology","topic":"Endocrinology"},
      {"id":64,"stem":"A 30F with secondary amenorrhea, galactorrhea, bitemporal hemianopia. Prolactin 280 (nl <25). MRI: 1.5cm pituitary adenoma. First-line treatment?","opts":["A. Cabergoline 0.5mg twice weekly","B. Transsphenoidal surgical resection","C. Stereotactic radiation therapy","D. Bromocriptine 2.5mg TID"],"correct":"A","expl":"Prolactinoma (any size): dopamine agonist first-line (cabergoline preferred - efficacy/tolerability over bromocriptine) can shrink tumor + normalize prolactin.","ref":"Harrison's Ch. 383","topic":"Endocrinology"},
      {"id":65,"stem":"A 25M with progressive hand/foot/jaw enlargement over 3yrs + excessive sweating. IGF-1 680. OGTT: GH fails to suppress. First-line treatment?","opts":["A. Transsphenoidal resection of pituitary","B. Octreotide long-acting monthly","C. Radiation therapy stereotactic","D. Pegvisomant daily SQ injection"],"correct":"A","expl":"Acromegaly from GH-secreting pituitary adenoma: transsphenoidal surgery = first-line; medical therapy as adjunct when surgery contraindicated.","ref":"Harrison's Ch. 383","topic":"Endocrinology"},
      {"id":66,"stem":"A 40M with epigastric pain worse on empty stomach, relieved by food. Endoscopy: duodenal ulcer. H. pylori+ on biopsy. Recommended first-line eradication?","opts":["A. PPI + clarithromycin + amoxicillin x 14 days","B. PPI monotherapy for 8 weeks total","C. Bismuth subsalicylate alone for 2 weeks","D. Sucralfate + famotidine for 6 weeks"],"correct":"A","expl":"First-line: PPI-based triple therapy (PPI + clarithro + amox/metronidazole) x14d; bismuth quadruple in high clarithro resistance areas.","ref":"Mudit Khanna Gastro H pylori + Harrison's Ch. 337","topic":"Gastroenterology"},
      {"id":67,"stem":"A 50M with epigastric pain 4h post heavy meal. Lipase 1200. Ranson's criteria at admission include all EXCEPT:","opts":["A. Age >55 years","B. Blood glucose >200 mg/dL","C. Serum calcium <8 mg/dL","D. AST >250 IU/L level"],"correct":"C","expl":"Ranson's at admission: GA LAW (Glucose>200, Age>55, LDH>350, AST>250, WBC>16K). Calcium <8 measured at 48h, not admission.","ref":"Mudit Khanna Gastro Pancreatitis + Harrison's Ch. 328","topic":"Gastroenterology"},
      {"id":68,"stem":"A 65M with cirrhosis presents with increasing abdominal distension. Paracentesis: total protein 1.2, SAAG 1.8, PMN 450. Most appropriate next step?","opts":["A. Start cefotaxime 2g IV q8h","B. Schedule elective therapeutic paracentesis","C. Start oral spironolactone + furosemide","D. Wait for culture results before starting antibiotic"],"correct":"A","expl":"SBP diagnosed when PMN >250; start cefotaxime immediately + IV albumin (1.5g/kg d1, 1g/kg d3).","ref":"Mudit Khanna Gastro SBP Q230 + Harrison's Ch. 331","topic":"Gastroenterology"},
      {"id":69,"stem":"A 35M with 4mo history bloody diarrhea, abdominal pain, tenesmus. Colonoscopy: continuous colonic mucosal inflammation from rectum to sigmoid. Biopsy: crypt abscesses. Most likely?","opts":["A. Ulcerative colitis","B. Crohn's disease terminal ileum","C. Bacillary dysentery Shigella","D. Intestinal tuberculosis"],"correct":"A","expl":"Continuous colonic inflammation from rectum + crypt abscesses + bloody diarrhea = ulcerative colitis.","ref":"Mudit Khanna Gastro IBD + Harrison's Ch. 336","topic":"Gastroenterology"},
      {"id":70,"stem":"A 45F with painless jaundice, pruritus, fatigue. Labs: ALP 480, bili 2.5, AST/ALT normal. AMA strongly positive 1:640. Most likely?","opts":["A. Primary biliary cholangitis","B. Primary sclerosing cholangitis","C. Autoimmune hepatitis type I","D. Choledocholithiasis"],"correct":"A","expl":"Middle-aged woman + cholestatic pattern + AMA+ = primary biliary cholangitis.","ref":"Mudit Khanna Hepatology Cholestatic + Harrison's Ch. 337","topic":"Gastroenterology"},
      {"id":71,"stem":"A 28M HBV screening. Serology: HBsAg+, anti-HBc tot+, anti-HBs-, HBeAg+, anti-HBe-. Consistent with?","opts":["A. Chronic hepatitis B with active replication","B. Acute hepatitis B early window phase","C. Resolved natural infection immunity","D. Vaccinated individual without infection"],"correct":"A","expl":"HBsAg+ + total anti-HBc+ + HBeAg+ = chronic HBV active replication; anti-HBs- = non-resolved.","ref":"Mudit Khanna Hep B serology table + Harrison's Ch. 341","topic":"Gastroenterology"},
      {"id":72,"stem":"A 60M with painless progressive jaundice 6wks + palpable gallbladder. Courvoisier's sign indicates?","opts":["A. Malignant obstruction of CBD","B. Gallstone impacted in the CBD","C. Stricture of the intrahepatic bile ducts","D. Acute inflammation of gallbladder"],"correct":"A","expl":"Painless jaundice + palpable gallbladder (Courvoisier's sign) = malignant biliary obstruction (typically pancreatic head CA) not gallstone (fibrotic/non-palpable gallbladder in gallstone obstructive jaundice).","ref":"Harrison's Ch. 38","topic":"Gastroenterology"},
      {"id":73,"stem":"A 40M with hematemesis AFTER binge alcohol vomiting. Most likely?","opts":["A. Mallory-Weiss mucosal tear","B. Esophageal variceal rupture","C. Peptic ulcer with perforation","D. Dieulafoy's lesion submucosal vessel"],"correct":"A","expl":"Hematemesis AFTER episodes of forceful vomiting (classically post-binge) = Mallory-Weiss tear (longitudinal mucosal laceration at GE junction).","ref":"Mudit Khanna Gastro UGIB + Harrison's Ch. 337","topic":"Gastroenterology"},
      {"id":74,"stem":"A 25F with severe fatigue, pallor. Hb 6.8, MCV 68, ferritin 8, TIBC 420. PS: microcytic hypochromic + pencil cells. Most likely?","opts":["A. Iron deficiency anemia","B. Thalassemia minor trait","C. Anemia of chronic disease","D. Sideroblastic anemia acquired"],"correct":"A","expl":"Microcytic anemia + low ferritin + high TIBC + pencil cells = IDA; ferritin most sensitive single indicator of iron stores.","ref":"Mudit Khanna Heme Anemia + Harrison's Ch. 115","topic":"Hematology"},
      {"id":75,"stem":"A 10M boy from malaria-endemic region presents with jaundice + dark urine 2d after starting antimalarial. PS: bite cells + Heinz bodies. G6PD low. Type?","opts":["A. G6PD deficiency with oxidative stress","B. Sickle cell anemia vaso-occlusive crisis","C. Autoimmune hemolytic anemia warm type","D. Hereditary spherocytosis fragile"],"correct":"A","expl":"Bite cells + Heinz bodies + hemolysis after oxidative drug (antimalarials) = acute hemolysis in G6PD deficiency.","ref":"Mudit Khanna Heme Hemolytic + Harrison's Ch. 122","topic":"Hematology"},
      {"id":76,"stem":"A 30F with petechiae + easy bruising. Platelets 15K. PT/aPTT normal. PS: isolated decreased platelets normal morphology. No HSM. Most likely?","opts":["A. ITP","B. DIC","C. TTP","D. APL leukemia"],"correct":"A","expl":"Isolated thrombocytopenia (15K) + normal PT/aPTT + no HSM + normal PS morphology except decreased platelets = ITP (diagnosis of exclusion; smear shows decreased platelets without clumping).","ref":"Mudit Khanna Heme ITP Q245 + Harrison's Ch. 125","topic":"Hematology"},
      {"id":77,"stem":"A 40M with fatigue + splenomegaly. WBC 180K with full spectrum myeloid cells including myelocytes, metamyelocytes, basophilia. BCR-ABL+. Most likely?","opts":["A. Chronic myeloid leukemia","B. Acute myeloid leukemia","C. Leukemoid physiological response","D. Primary myelofibrosis with fibrosis"],"correct":"A","expl":"Markedly increased WBC + full myeloid spectrum + basophilia + splenomegaly + BCR-ABL = CML chronic phase.","ref":"Mudit Khanna Heme Leuk + Harrison's Ch. 122","topic":"Hematology"},
      {"id":78,"stem":"A 65M with bone pain, recurrent infections, renal failure. Hb 8.2, Ca 11.8, Cr 2.8. SPEP: M-spike 3.2g/dL. UBJ+. Diagnosis?","opts":["A. Multiple myeloma","B. CLL","C. Waldenstrom's macroglobulinemia","D. MGUS"],"correct":"A","expl":"CRAB (increased Ca, renal failure, anemia, Bone lesions) + M-spike >3.0 + BJ + = MM.","ref":"Mudit Khanna Heme MM + Harrison's Ch. 123","topic":"Hematology"},
      {"id":79,"stem":"A 50F with increased aPTT 58sec that corrects on 1:1 mixing immediately but prolongs again after 2h incubation. Indicates?","opts":["A. Factor VIII inhibitor (acquired hemophilia)","B. Heparin contamination specimen","C. Severe liver synthetic dysfunction","D. Vitamin K antagonist oral effect"],"correct":"A","expl":"Delayed prolongation after 2h incubation = factor VIII inhibitor (acquired hemophilia A).","ref":"Mudit Khanna Heme Coagulation mixing + Harrison's Ch. 125","topic":"Hematology"},
      {"id":80,"stem":"A 45M with fever, weight loss 6wks + night sweats. Exam: HSM + generalized lymphadenopathy. Blood cultures sterile. Most diagnostic investigation?","opts":["A. Lymph node excisional biopsy","B. Serial repeat blood cultures","C. CT scan of entire abdomen","D. Bone marrow aspirate + trephine"],"correct":"A","expl":"For FUO with lymphadenopathy: excisional LN biopsy preserves architecture for histopathology (lymphoma, TB, sarcoidosis).","ref":"Harrison's Ch. 41 + Mudit Khanna FUO approach","topic":"Infectious Disease"}
    ]
